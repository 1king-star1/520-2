<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>520 心动时刻 💕</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            overflow: hidden;
            font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif;
        }

        .container {
            position: relative;
            width: 100%;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            cursor: pointer;
        }

        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        .text-container {
            position: relative;
            z-index: 10;
            text-align: center;
            opacity: 0;
            transform: scale(0.8);
            transition: all 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .text-container.visible {
            opacity: 1;
            transform: scale(1);
        }

        .title {
            font-size: clamp(2.5rem, 10vw, 6rem);
            font-weight: 900;
            letter-spacing: 0.1em;
            background: linear-gradient(90deg, #ff4b7a, #ff6b9d, #ff8fab, #ffc0cb, #ff8fab, #ff6b9d, #ff4b7a);
            background-size: 300% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: shimmer 3s linear infinite, heartbeat 2.5s ease-in-out infinite;
            text-shadow: 0 0 40px rgba(255, 75, 122, 0.6), 0 0 80px rgba(255, 107, 157, 0.4);
            margin-bottom: 15px;
            position: relative;
        }

        .title::before, .title::after {
            content: '520';
            position: absolute;
            left: 0;
            width: 100%;
            font-size: inherit;
            font-weight: inherit;
            letter-spacing: inherit;
            -webkit-background-clip: text;
            background-clip: text;
        }

        .title::before {
            top: 3px;
            left: 3px;
            color: rgba(0, 0, 0, 0.4);
            z-index: -1;
        }

        .title::after {
            top: -1px;
            left: -1px;
            color: rgba(255, 255, 255, 0.3);
            z-index: -2;
        }

        @keyframes shimmer {
            0% { background-position: 0% center; }
            100% { background-position: 300% center; }
        }

        @keyframes heartbeat {
            0%, 100% { 
                transform: scale(0.92);
                text-shadow: 0 0 30px rgba(255, 75, 122, 0.5), 0 0 60px rgba(255, 107, 157, 0.3);
            }
            50% { 
                transform: scale(1.08);
                text-shadow: 0 0 50px rgba(255, 75, 122, 0.8), 0 0 100px rgba(255, 107, 157, 0.5);
            }
        }

        .subtitle {
            font-size: clamp(1.2rem, 3.5vw, 1.8rem);
            color: rgba(255, 182, 193, 0.95);
            letter-spacing: 0.5em;
            margin-bottom: 25px;
            text-shadow: 0 0 20px rgba(255, 182, 193, 0.5);
        }

        .love-quote {
            position: absolute;
            font-size: clamp(0.65rem, 2.8vw, 1.0rem);
            font-weight: 600;
            background: linear-gradient(135deg, #ff6b9d 0%, #ff4b7a 30%, #ffc0cb 50%, #dda0dd 70%, #ff6b9d 100%);
            background-size: 200% 200%;
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 0.1em;
            text-shadow: 0 0 30px rgba(255, 75, 122, 0.9), 0 0 60px rgba(255, 107, 157, 0.6), 0 0 100px rgba(221, 160, 221, 0.4);
            opacity: 0;
            pointer-events: none;
            white-space: normal;
            max-width: 85%;
            text-align: center;
            z-index: 20;
            animation: quoteFloat 4s ease-in-out infinite, quoteGlow 2s ease-in-out infinite, quoteGradient 3s ease infinite;
        }

        .love-quote.show {
            opacity: 1;
        }

        .love-quote.fade-out {
            opacity: 0;
            transition: opacity 1s ease-out;
        }

        @keyframes quoteFloat {
            0%, 100% { transform: translateY(0) rotate(-2deg); }
            50% { transform: translateY(-15px) rotate(2deg); }
        }

        @keyframes quoteGlow {
            0%, 100% { text-shadow: 0 0 30px rgba(255, 75, 122, 0.9), 0 0 60px rgba(255, 107, 157, 0.6), 0 0 100px rgba(221, 160, 221, 0.4); }
            50% { text-shadow: 0 0 45px rgba(255, 75, 122, 1), 0 0 90px rgba(255, 107, 157, 0.8), 0 0 130px rgba(221, 160, 221, 0.6); }
        }

        @keyframes quoteGradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .hint {
            font-size: clamp(0.9rem, 2.5vw, 1.2rem);
            color: rgba(255, 182, 193, 0.7);
            animation: pulse 2s ease-in-out infinite;
            position: relative;
        }

        .hint.up {
            transform: translateY(-80px);
            opacity: 0;
            transition: all 0.8s ease;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.5; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.05); }
        }

        .love-text {
            position: absolute;
            bottom: 12%;
            left: 50%;
            transform: translateX(-50%);
            font-size: clamp(1.4rem, 4.5vw, 2.5rem);
            color: rgba(255, 107, 157, 0);
            opacity: 0;
            white-space: nowrap;
            transition: all 1.5s ease;
            text-shadow: 0 0 30px rgba(255, 107, 157, 0.9), 0 0 60px rgba(255, 139, 182, 0.5);
            letter-spacing: 0.05em;
        }

        .love-text.show {
            opacity: 1;
            color: rgba(255, 107, 157, 0.95);
            animation: textFloat 3s ease-in-out infinite;
        }

        @keyframes textFloat {
            0%, 100% { transform: translateX(-50%) translateY(0); }
            50% { transform: translateX(-50%) translateY(-10px); }
        }

        .controls {
            position: absolute;
            bottom: 20px;
            right: 20px;
            z-index: 20;
            display: flex;
            gap: 10px;
        }

        .control-btn {
            background: rgba(255, 107, 157, 0.2);
            border: 1px solid rgba(255, 107, 157, 0.4);
            color: rgba(255, 182, 193, 0.9);
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.3s ease;
        }

        .control-btn:hover {
            background: rgba(255, 107, 157, 0.4);
            transform: scale(1.05);
        }

        .control-btn.active {
            background: rgba(255, 107, 157, 0.6);
        }
    </style>
</head>
<body>
    <div class="container" id="container">
        <canvas id="particleCanvas"></canvas>

        <div class="text-container" id="textContainer">
            <div class="title">520</div>
            <div class="subtitle">我爱你</div>
            <div class="hint" id="hint">点屏幕有惊喜...</div>
        </div>

        <div class="love-text" id="loveText">
            ❤️ 大笨蛋，遇见你是我最美的意外 ❤️
        </div>

        <div class="controls">
            <button class="control-btn" id="loopBtn">循环播放</button>
            <button class="control-btn" id="soundBtn">🔊 音效</button>
        </div>
    </div>

    <script>
        // ========== 全局配置 ==========
        const CONFIG = {
            colors: {
                primary: '#ff4b7a',
                secondary: '#ff6b9d',
                tertiary: '#ff8fab',
                accent: '#ffc0cb',
                purple: '#dda0dd',
                glow: 'rgba(255, 75, 122, 0.4)',
                background1: '#0d0d1a',
                background2: '#1a0a1a',
                background3: '#150510'
            },
            particle: {
                count: 250,
                poolSize: 300,
                size: 4,
                speed: 2,
                trailLength: 3
            },
            rose: {
                count: 5,
                petalsPerRose: 8,
                replaceInterval: 1500,
                fadeOutDuration: 1500,
                bloomDuration: 3000,
                replaceStartDelay: 5000,
                loopInterval: 4000
            },
            animation: {
                duration: 52100,
                bloomDelay: 2500,
                fadeDelay: 5000,
                heartbeatSpeed: 0.003,
                typingStartDelay: 6000,
                autoClickInterval: 1500
            }
        };

        // ========== 检测移动端 ==========
        const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
        if (isMobile) {
            CONFIG.particle.count = Math.floor(CONFIG.particle.count * 0.6);
            CONFIG.particle.poolSize = Math.floor(CONFIG.particle.poolSize * 0.6);
            CONFIG.animation.autoClickInterval = 1500;
        }

        // ========== 粒子对象池 ==========
        class ParticlePool {
            constructor(canvas, size) {
                this.canvas = canvas;
                this.pool = [];
                this.active = [];
                this.size = size;
                this.init();
            }

            init() {
                for (let i = 0; i < this.size; i++) {
                    this.pool.push(new Particle(this.canvas, true));
                }
            }

            get() {
                if (this.pool.length > 0) {
                    const p = this.pool.pop();
                    p.reset();
                    this.active.push(p);
                    return p;
                }
                const p = new Particle(this.canvas, false);
                this.active.push(p);
                return p;
            }

            recycle(particle) {
                particle.reset();
                this.pool.push(particle);
                const idx = this.active.indexOf(particle);
                if (idx > -1) this.active.splice(idx, 1);
            }

            getAll() {
                return this.active;
            }
        }

        // ========== 粒子类 ==========
        class Particle {
            constructor(canvas, inPool = false) {
                this.canvas = canvas;
                this.inPool = inPool;
                this.reset();
            }

            reset() {
                this.x = Math.random() * this.canvas.width;
                this.y = Math.random() * this.canvas.height;
                this.targetX = this.canvas.width / 2;
                this.targetY = this.canvas.height / 2;
                this.vx = (Math.random() - 0.5) * CONFIG.particle.speed;
                this.vy = (Math.random() - 0.5) * CONFIG.particle.speed;
                this.size = Math.random() * CONFIG.particle.size + 1.5;
                this.baseSize = this.size;
                this.colors = [
                    CONFIG.colors.primary, CONFIG.colors.secondary, CONFIG.colors.tertiary
                ];
                this.color = this.colors[Math.floor(Math.random() * this.colors.length)];
                this.alpha = Math.random() * 0.4 + 0.6;
                this.bloomAngle = Math.random() * Math.PI * 2;
                this.bloomSpeed = Math.random() * 3 + 1.5;
                this.heartbeat = Math.random() * Math.PI * 2;
                this.trail = [];
                this.maxTrail = CONFIG.particle.trailLength;
                this.currentPhaseColors = this.colors;
                this.distToCenter = this.calculateDistToCenter();
            }

            calculateDistToCenter() {
                const cx = this.canvas.width / 2;
                const cy = this.canvas.height / 2;
                return Math.sqrt((this.x - cx) ** 2 + (this.y - cy) ** 2);
            }

            isInViewport() {
                const margin = 100;
                return this.x > -margin && this.x < this.canvas.width + margin &&
                       this.y > -margin && this.y < this.canvas.height + margin;
            }

            update(phase, elapsed) {
                this.heartbeat += 0.06;
                const pulse = 1 + Math.sin(this.heartbeat) * 0.3;
                this.size = this.baseSize * pulse;

                this.distToCenter = this.calculateDistToCenter();
                const maxDist = Math.max(this.canvas.width, this.canvas.height) / 2;
                const distRatio = Math.min(this.distToCenter / maxDist, 1);

                if (phase === 'gather') {
                    const dx = this.targetX - this.x;
                    const dy = this.targetY - this.y;
                    const attraction = 0.003 + (1 - distRatio) * 0.004;
                    this.vx += dx * attraction;
                    this.vy += dy * attraction;
                    this.vx *= 0.97;
                    this.vy *= 0.97;
                    this.updateColor(phase);
                } else if (phase === 'bloom') {
                    const bloomForce = 0.15 + distRatio * 0.1;
                    this.vx += Math.cos(this.bloomAngle) * this.bloomSpeed * bloomForce;
                    this.vy += Math.sin(this.bloomAngle) * this.bloomSpeed * bloomForce;
                    this.bloomAngle += 0.025;
                    this.vx *= 0.985;
                    this.vy *= 0.985;
                    this.updateColor(phase);
                } else if (phase === 'disperse') {
                    this.vy -= 0.25 + distRatio * 0.1;
                    this.vx += (Math.random() - 0.5) * 0.4;
                    this.alpha -= 0.004;
                    this.updateColor(phase);
                }

                this.x += this.vx;
                this.y += this.vy;

                this.trail.push({ x: this.x, y: this.y, alpha: this.alpha });
                if (this.trail.length > this.maxTrail) {
                    this.trail.shift();
                }

                if (this.x < -50) this.x = this.canvas.width + 50;
                if (this.x > this.canvas.width + 50) this.x = -50;
                if (this.y < -50) this.y = this.canvas.height + 50;
                if (this.y > this.canvas.height + 50) this.y = -50;

                return this.alpha > 0;
            }

            updateColor(phase) {
                if (phase === 'gather') {
                    this.currentPhaseColors = [CONFIG.colors.secondary, CONFIG.colors.tertiary, CONFIG.colors.accent];
                } else if (phase === 'bloom') {
                    this.currentPhaseColors = [CONFIG.colors.primary, CONFIG.colors.secondary, CONFIG.colors.purple];
                } else if (phase === 'disperse') {
                    this.currentPhaseColors = [CONFIG.colors.tertiary, CONFIG.colors.purple, CONFIG.colors.accent];
                }
                if (Math.random() < 0.02) {
                    this.color = this.currentPhaseColors[Math.floor(Math.random() * this.currentPhaseColors.length)];
                }
            }

            draw(ctx) {
                if (!this.isInViewport()) return;

                ctx.save();
                
                for (let i = 0; i < this.trail.length; i++) {
                    const t = this.trail[i];
                    const trailAlpha = (i / this.trail.length) * this.alpha * 0.4;
                    ctx.globalAlpha = trailAlpha;
                    ctx.fillStyle = this.color;
                    const trailSize = this.size * (i / this.trail.length) * 0.6;
                    this.drawHeart(ctx, t.x, t.y, trailSize);
                }

                ctx.globalAlpha = this.alpha;
                ctx.fillStyle = this.color;
                this.drawHeart(ctx, this.x, this.y, this.size);

                ctx.restore();
            }

            drawHeart(ctx, x, y, size) {
                ctx.beginPath();
                const w = size * 2;
                const h = size * 2;

                ctx.moveTo(x, y + h / 4);
                ctx.bezierCurveTo(x, y, x - w / 2, y, x - w / 2, y + h / 4);
                ctx.bezierCurveTo(x - w / 2, y + h / 2, x, y + h * 0.7, x, y + h);
                ctx.bezierCurveTo(x, y + h * 0.7, x + w / 2, y + h / 2, x + w / 2, y + h / 4);
                ctx.bezierCurveTo(x + w / 2, y, x, y, x, y + h / 4);

                ctx.shadowBlur = 8;
                ctx.shadowColor = this.color;
                ctx.fill();
                ctx.shadowBlur = 0;
            }
        }

        // ========== 玫瑰花类 ==========
        class RoseFlower {
            constructor(canvas, x, y, radius) {
                this.canvas = canvas;
                this.x = x;
                this.y = y;
                this.radius = radius;
                this.baseAlpha = 0.12;
                this.pulse = Math.random() * Math.PI * 2;
                this.bloomPhase = 0;
                this.petalRotation = Math.random() * Math.PI * 2;
                this.swayPhase = Math.random() * Math.PI * 2;
                this.swayOffset = Math.random() * Math.PI;
                this.lightPhase = Math.random() * Math.PI * 2;
                this.fadeOut = false;
                this.fadeOutPhase = 0;
                this.bloomCyclePhase = 0;
                this.isLooping = false;
            }

            update(elapsed, windOffset) {
                this.pulse += 0.025;
                this.swayPhase += 0.015;
                this.lightPhase += 0.02;

                const bloomDelay = CONFIG.animation.bloomDelay;
                const bloomDuration = CONFIG.rose.bloomDuration;
                const loopInterval = CONFIG.rose.loopInterval;

                if (!this.fadeOut) {
                    if (elapsed > bloomDelay) {
                        const bloomElapsed = elapsed - bloomDelay;
                        
                        if (bloomElapsed > bloomDuration + 2000) {
                            this.isLooping = true;
                        }
                        
                        if (this.isLooping) {
                            const cycleElapsed = bloomElapsed - bloomDuration - 2000;
                            this.bloomCyclePhase = (cycleElapsed % loopInterval) / loopInterval;
                            
                            if (this.bloomCyclePhase < 0.5) {
                                this.bloomPhase = 0.3 + this.bloomCyclePhase * 1.4;
                            } else {
                                this.bloomPhase = 1 - (this.bloomCyclePhase - 0.5) * 1.4;
                            }
                        } else {
                            this.bloomPhase = Math.min(1, bloomElapsed / bloomDuration);
                        }
                    }
                } else {
                    this.fadeOutPhase += 0.015;
                    if (this.fadeOutPhase >= 1) {
                        this.fadeOutPhase = 1;
                    }
                }

                this.petalRotation += 0.005;
                this.swayPhase += windOffset * 0.01;
            }

            startFadeOut() {
                this.fadeOut = true;
                this.fadeOutPhase = 0;
            }

            isFullyFaded() {
                return this.fadeOut && this.fadeOutPhase >= 1;
            }

            draw(ctx) {
                ctx.save();
                
                let overallAlpha = this.baseAlpha + this.bloomPhase * 0.22;
                
                if (this.fadeOut) {
                    overallAlpha *= (1 - this.fadeOutPhase);
                }
                
                ctx.globalAlpha = Math.max(0, overallAlpha);
                ctx.translate(this.x, this.y);
                
                const lightMod = 0.85 + Math.sin(this.lightPhase) * 0.15;
                
                ctx.shadowBlur = 50;
                ctx.shadowColor = `rgba(255, 75, 122, ${0.5 * lightMod})`;
                
                this.drawRose(ctx, this.radius, this.fadeOut ? 0 : this.bloomPhase);
                this.drawGlowAura(ctx, this.radius);
                
                ctx.restore();
            }

            drawGlowAura(ctx, size) {
                const grad = ctx.createRadialGradient(0, 0, size * 0.4, 0, 0, size * 1.8);
                grad.addColorStop(0, 'rgba(255, 139, 182, 0.18)');
                grad.addColorStop(0.4, 'rgba(255, 107, 157, 0.1)');
                grad.addColorStop(1, 'transparent');
                
                ctx.fillStyle = grad;
                ctx.beginPath();
                ctx.arc(0, 0, size * 1.8, 0, Math.PI * 2);
                ctx.fill();
            }

            drawRose(ctx, size, bloomPhase) {
                const petalCount = 8;
                const layerCount = 3;
                const eased = easeOutBack(Math.min(1, bloomPhase));

                for (let layer = layerCount - 1; layer >= 0; layer--) {
                    const layerDelay = layer * 0.2;
                    const layerPhase = Math.max(0, bloomPhase - layerDelay);
                    const layerEased = easeOutBack(Math.min(1, layerPhase));
                    const layerOffset = layer * 0.4;
                    const layerSize = size * (1 - layer * 0.15);
                    const sway = Math.sin(this.swayPhase + layer * 0.9 + this.swayOffset) * 0.07;
                    const layerAlpha = 1 - layer * 0.38;

                    for (let i = 0; i < petalCount; i++) {
                        const petalOffset = i * 0.15;
                        const angle = (i / petalCount) * Math.PI * 2 + this.petalRotation + layerOffset + petalOffset;
                        const petalVariation = 0.78 + Math.sin(i * 1.1 + layer) * 0.22;
                        const petalSize = layerSize * petalVariation;

                        ctx.save();
                        ctx.rotate(angle + sway);
                        ctx.translate(0, -layerSize * 0.12 * layerEased);
                        ctx.globalAlpha *= layerAlpha;
                        
                        const petalOpen = this.calculatePetalOpen(layerPhase, i, petalCount);
                        this.drawPetal(ctx, 0, 0, petalSize, layerPhase, petalOpen, layer);
                        
                        ctx.restore();
                    }
                }

                if (bloomPhase > 0.25) {
                    const centerPhase = (bloomPhase - 0.25) / 0.75;
                    const centerSize = easeOutCubic(Math.min(1, centerPhase));

                    ctx.shadowBlur = 25;
                    ctx.shadowColor = 'rgba(255, 235, 120, 0.5)';

                    const grad = ctx.createRadialGradient(0, 0, 0, 0, 0, size * 0.28);
                    grad.addColorStop(0, 'rgba(255, 240, 150, 0.6)');
                    grad.addColorStop(0.4, 'rgba(255, 192, 203, 0.4)');
                    grad.addColorStop(1, 'rgba(255, 139, 182, 0.15)');

                    ctx.fillStyle = grad;
                    ctx.beginPath();
                    ctx.arc(0, 0, size * 0.2 * centerSize, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.shadowBlur = 0;
                }
            }

            calculatePetalOpen(phase, petalIndex, totalPetals) {
                if (phase <= 0) return 0.18;
                const baseOpen = 0.28;
                const maxOpen = 0.95;
                const progress = easeOutBack(Math.min(1, phase));
                return baseOpen + (maxOpen - baseOpen) * progress;
            }

            drawPetal(ctx, x, y, size, bloomPhase, petalOpen, layer) {
                const grad = ctx.createRadialGradient(x, y - size * 0.3, 0, x, y, size);
                const hueShift = layer * 10;
                
                grad.addColorStop(0, `hsla(${348 - hueShift}, 65%, 88%, 0.75)`);
                grad.addColorStop(0.4, `hsla(${352 - hueShift}, 60%, 72%, 0.55)`);
                grad.addColorStop(1, `hsla(${352 - hueShift}, 52%, 62%, 0.18)`);

                ctx.fillStyle = grad;
                ctx.beginPath();

                const widthFactor = 0.28 + petalOpen * 0.68;
                const petalLength = size * (0.68 + bloomPhase * 0.28);

                const cp1x = x - size * 0.48 * widthFactor;
                const cp1y = y + size * 0.09;
                const cp2x = x - size * 0.28 * widthFactor;
                const cp2y = y - petalLength * 0.58;
                const topX = x;
                const topY = y - petalLength;
                const cp3x = x + size * 0.28 * widthFactor;
                const cp3y = y - petalLength * 0.58;
                const cp4x = x + size * 0.48 * widthFactor;
                const cp4y = y + size * 0.09;

                ctx.moveTo(x, y + size * 0.16);
                ctx.bezierCurveTo(cp1x, cp1y, cp2x, cp2y, topX, topY);
                ctx.bezierCurveTo(cp3x, cp3y, cp4x, cp4y, x, y + size * 0.16);
                ctx.fill();

                if (bloomPhase > 0.35) {
                    const highlightGrad = ctx.createRadialGradient(
                        x - size * 0.18, y - petalLength * 0.5, 0,
                        x - size * 0.18, y - petalLength * 0.5, size * 0.45
                    );
                    highlightGrad.addColorStop(0, 'rgba(255, 255, 255, 0.45)');
                    highlightGrad.addColorStop(1, 'transparent');
                    
                    ctx.fillStyle = highlightGrad;
                    ctx.beginPath();
                    ctx.moveTo(x, y + size * 0.1);
                    ctx.bezierCurveTo(
                        cp1x * 0.75, cp1y,
                        x - size * 0.16, y - petalLength * 0.5,
                        topX * 0.94, topY
                    );
                    ctx.bezierCurveTo(
                        x, y - petalLength * 0.58,
                        x, y + size * 0.04,
                        x, y + size * 0.1
                    );
                    ctx.fill();
                }
            }
        }

        // ========== 飘落花瓣类 ==========
        class FallingPetal {
            constructor(canvas, roseX, roseY) {
                this.canvas = canvas;
                this.roseX = roseX;
                this.roseY = roseY;
                this.reset();
            }

            reset() {
                const angle = Math.random() * Math.PI * 2;
                const dist = Math.random() * 30 + 10;
                this.x = this.roseX + Math.cos(angle) * dist;
                this.y = this.roseY + Math.sin(angle) * dist;
                this.vx = (Math.random() - 0.5) * 0.8;
                this.vy = Math.random() * 0.5 + 0.3;
                this.size = Math.random() * 8 + 5;
                this.rotation = Math.random() * Math.PI * 2;
                this.rotSpeed = (Math.random() - 0.5) * 0.05;
                this.alpha = Math.random() * 0.5 + 0.4;
                this.life = 1;
                this.swayPhase = Math.random() * Math.PI * 2;
                this.wobble = Math.random() * 2 + 1;
            }

            update(windOffset) {
                this.swayPhase += 0.03;
                this.x += this.vx + Math.sin(this.swayPhase) * 0.5 + windOffset * 0.3;
                this.y += this.vy;
                this.rotation += this.rotSpeed;
                this.life -= 0.002;
                this.alpha = this.life * (0.4 + Math.sin(this.swayPhase * this.wobble) * 0.1);

                if (this.y > this.canvas.height + 50 || this.life <= 0) {
                    return false;
                }
                return true;
            }

            draw(ctx) {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.rotation);
                ctx.globalAlpha = this.alpha;

                const grad = ctx.createRadialGradient(0, -this.size * 0.3, 0, 0, 0, this.size);
                grad.addColorStop(0, 'hsla(350, 70%, 85%, 0.8)');
                grad.addColorStop(0.5, 'hsla(355, 65%, 75%, 0.5)');
                grad.addColorStop(1, 'hsla(355, 55%, 65%, 0.15)');
                
                ctx.fillStyle = grad;
                ctx.shadowBlur = 5;
                ctx.shadowColor = 'rgba(255, 107, 157, 0.4)';

                ctx.beginPath();
                const w = this.size * 0.8;
                const h = this.size;
                ctx.moveTo(0, h * 0.2);
                ctx.bezierCurveTo(-w, 0, -w * 0.5, -h * 0.6, 0, -h);
                ctx.bezierCurveTo(w * 0.5, -h * 0.6, w, 0, 0, h * 0.2);
                ctx.fill();

                ctx.restore();
            }
        }

        // ========== 点击涟漪类 ==========
        class ClickRipple {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.radius = 5;
                this.maxRadius = 150;
                this.alpha = 1;
                this.expandSpeed = 4;
            }

            update() {
                this.radius += this.expandSpeed;
                this.alpha = 1 - (this.radius / this.maxRadius);
                return this.alpha > 0;
            }

            draw(ctx) {
                ctx.save();
                ctx.globalAlpha = this.alpha * 0.6;
                
                for (let i = 0; i < 3; i++) {
                    const r = this.radius + i * 25;
                    const a = this.alpha * (1 - i * 0.25);
                    ctx.globalAlpha = a * 0.5;
                    ctx.strokeStyle = 'rgba(255, 107, 157, 0.8)';
                    ctx.lineWidth = 2;
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, r, 0, Math.PI * 2);
                    ctx.stroke();
                }
                
                ctx.restore();
            }
        }

        // ========== 爱心烟花粒子 ==========
        class FireworkHeart {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.angle = Math.random() * Math.PI * 2;
                this.speed = Math.random() * 4 + 2;
                this.vx = Math.cos(this.angle) * this.speed;
                this.vy = Math.sin(this.angle) * this.speed;
                this.size = Math.random() * 5 + 3;
                this.alpha = 1;
                this.gravity = 0.05;
                this.life = 1;
                this.colors = [CONFIG.colors.primary, CONFIG.colors.secondary, CONFIG.colors.accent, CONFIG.colors.purple];
                this.color = this.colors[Math.floor(Math.random() * this.colors.length)];
            }

            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.vy += this.gravity;
                this.life -= 0.015;
                this.alpha = this.life;
                return this.life > 0;
            }

            draw(ctx) {
                ctx.save();
                ctx.globalAlpha = this.alpha;
                ctx.fillStyle = this.color;
                ctx.shadowBlur = 8;
                ctx.shadowColor = this.color;
                
                const w = this.size * 2;
                const h = this.size * 2;
                ctx.beginPath();
                ctx.moveTo(this.x, this.y + h / 4);
                ctx.bezierCurveTo(this.x, this.y, this.x - w / 2, this.y, this.x - w / 2, this.y + h / 4);
                ctx.bezierCurveTo(this.x - w / 2, this.y + h / 2, this.x, this.y + h * 0.7, this.x, this.y + h);
                ctx.bezierCurveTo(this.x, this.y + h * 0.7, this.x + w / 2, this.y + h / 2, this.x + w / 2, this.y + h / 4);
                ctx.bezierCurveTo(this.x + w / 2, this.y, this.x, this.y, this.x, this.y + h / 4);
                ctx.fill();
                
                ctx.restore();
            }
        }

        // ========== 星星粒子 ==========
        class Star {
            constructor(canvas) {
                this.canvas = canvas;
                this.reset();
            }

            reset() {
                this.x = Math.random() * this.canvas.width;
                this.y = Math.random() * this.canvas.height;
                this.size = Math.random() * 2 + 0.5;
                this.alpha = Math.random() * 0.5 + 0.2;
                this.twinklePhase = Math.random() * Math.PI * 2;
                this.twinkleSpeed = Math.random() * 0.05 + 0.02;
            }

            update() {
                this.twinklePhase += this.twinkleSpeed;
                this.alpha = 0.15 + Math.sin(this.twinklePhase) * 0.25;
            }

            draw(ctx) {
                ctx.save();
                ctx.globalAlpha = this.alpha;
                ctx.fillStyle = 'rgba(255, 240, 245, 0.9)';
                ctx.shadowBlur = 5;
                ctx.shadowColor = 'rgba(255, 255, 255, 0.5)';
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            }
        }

        // ========== 烟雾粒子 ==========
        class FogParticle {
            constructor(canvas) {
                this.canvas = canvas;
                this.reset();
            }

            reset() {
                this.x = Math.random() * this.canvas.width;
                this.y = Math.random() * this.canvas.height;
                this.size = Math.random() * 200 + 100;
                this.alpha = Math.random() * 0.08 + 0.02;
                this.vx = (Math.random() - 0.5) * 0.3;
                this.vy = (Math.random() - 0.5) * 0.2;
                this.phase = Math.random() * Math.PI * 2;
            }

            update() {
                this.phase += 0.01;
                this.x += this.vx + Math.sin(this.phase) * 0.2;
                this.y += this.vy;
                
                if (this.x < -this.size) this.x = this.canvas.width + this.size;
                if (this.x > this.canvas.width + this.size) this.x = -this.size;
                if (this.y < -this.size) this.y = this.canvas.height + this.size;
                if (this.y > this.canvas.height + this.size) this.y = -this.size;
            }

            draw(ctx) {
                const grad = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, this.size);
                grad.addColorStop(0, `rgba(60, 30, 50, ${this.alpha * 0.4})`);
                grad.addColorStop(0.5, `rgba(40, 20, 35, ${this.alpha * 0.2})`);
                grad.addColorStop(1, 'transparent');
                
                ctx.fillStyle = grad;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        // ========== 缓动函数 ==========
        function easeOutCubic(t) {
            return 1 - Math.pow(1 - t, 3);
        }

        function easeOutBack(t) {
            const c1 = 1.70158;
            const c3 = c1 + 1;
            return 1 + c3 * Math.pow(t - 1, 3) + c1 * Math.pow(t - 1, 2);
        }

        function easeInOutSine(t) {
            return -(Math.cos(Math.PI * t) - 1) / 2;
        }

        // ========== 音频管理器类 ==========
        class AudioManager {
            constructor() {
                this.audio = null;
                this.isMuted = false;
                this.backgroundPlaying = false;
                this.audioInitialized = false;
            }

            init() {
                if (!this.audio) {
                    this.audio = new Audio();
                    this.audio.src = '所念皆星河（新版）-CMJ.mp3';
                    this.audio.loop = true;
                    this.audio.volume = 0.5;
                    this.audio.preload = 'auto';
                    this.audio.setAttribute('playsinline', '');
                    this.audio.setAttribute('webkit-playsinline', '');
                }
                if (!this.audioInitialized) {
                    this.audioInitialized = true;
                }
                return this;
            }

            toggleMute() {
                this.isMuted = !this.isMuted;
                if (this.audio) {
                    this.audio.volume = this.isMuted ? 0 : 0.5;
                }
                return this.isMuted;
            }

            async playBackgroundMusic() {
                if (this.isMuted || !this.audio) return;

                try {
                    this.audio.currentTime = 0;
                    await this.audio.play();
                    this.backgroundPlaying = true;
                } catch (err) {
                    console.log('音频播放需要用户交互:', err);
                    document.addEventListener('touchstart', () => {
                        if (!this.backgroundPlaying && !this.isMuted) {
                            this.audio.play().then(() => {
                                this.backgroundPlaying = true;
                            }).catch(() => {});
                        }
                    }, { once: true });
                }
            }

            stopBackgroundMusic() {
                if (this.audio && !this.audio.paused) {
                    this.audio.pause();
                    this.audio.currentTime = 0;
                    this.backgroundPlaying = false;
                }
            }

            playHeartbeatSound() {
            }

            playClickSound() {
            }
        }

        class LoveAnimation {

                this.backgroundPhase = 0;

                this.resize();

                this.container.addEventListener('click', (e) => this.handleClick(e));
                this.loopBtn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    this.toggleLoop();
                });
                this.soundBtn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    this.toggleSound();
                });
                
                this.particlePool = new ParticlePool(this.canvas, CONFIG.particle.poolSize);
                
                this.createParticles();
                this.createRoses();
                this.createStars();
                this.createFog();
                
                this.render();
                
                setTimeout(() => {
                    if (this.phase === 'idle') {
                        this.startAnimation();
                    }
                }, 3000);
            }

            resize() {
                this.canvas.width = window.innerWidth;
                this.canvas.height = window.innerHeight;
                
                if (this.particles.length > 0) {
                    this.particles.forEach(p => {
                        p.canvas = this.canvas;
                        p.targetX = this.canvas.width / 2;
                        p.targetY = this.canvas.height / 2;
                    });
                }
                
                if (this.roses.length === 0) {
                    this.createRoses();
                }
            }

            createParticles() {
                this.particles = [];
                for (let i = 0; i < CONFIG.particle.count; i++) {
                    const p = this.particlePool.get();
                    this.particles.push(p);
                }
            }

            createRoses() {
                this.roses = [];
                const positions = [
                    { x: this.canvas.width * 0.15, y: this.canvas.height * 0.2 },
                    { x: this.canvas.width * 0.85, y: this.canvas.height * 0.25 },
                    { x: this.canvas.width * 0.2, y: this.canvas.height * 0.75 },
                    { x: this.canvas.width * 0.8, y: this.canvas.height * 0.8 },
                    { x: this.canvas.width * 0.5, y: this.canvas.height * 0.15 }
                ];
                
                const sizes = [120, 90, 100, 80, 70];
                
                positions.forEach((pos, i) => {
                    const rose = new RoseFlower(this.canvas, pos.x, pos.y, sizes[i]);
                    this.roses.push(rose);
                });
            }
            
            createNewRosePosition() {
                const padding = 100;
                const x = padding + Math.random() * (this.canvas.width - padding * 2);
                const y = padding + Math.random() * (this.canvas.height - padding * 2);
                const radius = 70 + Math.random() * 60;
                return { x, y, radius };
            }
            
            startRoseReplace() {
                if (this.roseReplaceTimer) return;
                
                this.roseReplaceIndex = 0;
                
                const replaceNext = () => {
                    if (this.roseReplaceIndex >= this.roses.length) {
                        this.roseReplaceTimer = null;
                        return;
                    }
                    
                    const oldRose = this.roses[this.roseReplaceIndex];
                    oldRose.startFadeOut();
                    
                    const newPos = this.createNewRosePosition();
                    const newRose = new RoseFlower(this.canvas, newPos.x, newPos.y, newPos.radius);
                    this.roses.push(newRose);
                    
                    this.roseReplaceIndex++;
                    
                    this.roseReplaceTimer = setTimeout(replaceNext, CONFIG.rose.replaceInterval + CONFIG.rose.fadeOutDuration);
                };
                
                replaceNext();
            }
            
            updateRoses(elapsed) {
                const replaceStartDelay = CONFIG.rose.replaceStartDelay;
                const bloomDelay = CONFIG.animation.bloomDelay;
                
                if (elapsed > bloomDelay + replaceStartDelay && !this.roseReplaceTimer && this.roseReplaceIndex < this.roses.length) {
                    this.startRoseReplace();
                }
                
                this.roses = this.roses.filter(rose => !rose.isFullyFaded());
                
                this.roses.forEach(rose => {
                    rose.update(elapsed, this.windOffset);
                });
            }
            
            createStars() {
                this.stars = [];
                const count = isMobile ? 40 : 70;
                for (let i = 0; i < count; i++) {
                    this.stars.push(new Star(this.canvas));
                }
            }

            createFog() {
                this.fog = [];
                const count = isMobile ? 8 : 12;
                for (let i = 0; i < count; i++) {
                    this.fog.push(new FogParticle(this.canvas));
                }
            }

            handleClick(e, isAuto = false) {
                const rect = this.canvas.getBoundingClientRect();
                const x = isAuto ? Math.random() * this.canvas.width : (e.clientX - rect.left);
                const y = isAuto ? Math.random() * this.canvas.height : (e.clientY - rect.top);
                
                const fireworkCount = isMobile ? 12 : 25;
                for (let i = 0; i < fireworkCount; i++) {
                    this.fireworks.push(new FireworkHeart(x, y));
                }
                
                this.ripples.push(new ClickRipple(x, y));
                
                this.shakeAmount = isMobile ? 1.2 : 3;
                
                this.audioManager.init();
                
                if (!this.audioManager.isMuted && !this.audioManager.backgroundPlaying && !isAuto) {
                    this.audioManager.playBackgroundMusic();
                }
                
                if (this.phase === 'idle') {
                    this.startAnimation();
                }
            }

            toggleLoop() {
                this.isLooping = !this.isLooping;
                this.loopBtn.textContent = this.isLooping ? '循环中' : '循环播放';
                this.loopBtn.classList.toggle('active', this.isLooping);
            }
            
            toggleSound() {
                const isMuted = this.audioManager.init().toggleMute();
                this.soundBtn.textContent = isMuted ? '🔊 音效' : '🔇 静音';
                this.soundBtn.classList.toggle('active', !isMuted);
                
                if (!isMuted) {
                    this.audioManager.playBackgroundMusic();
                }
            }

            startAnimation() {
                this.audioManager.init();
                if (!this.audioManager.isMuted && !this.audioManager.backgroundPlaying) {
                    this.audioManager.playBackgroundMusic();
                }
                if (this.phase !== 'idle') return;
                
                this.phase = 'gather';
                this.startTime = Date.now();
                this.elapsed = 0;
                this.typingStarted = false;
                
                this.textContainer.classList.remove('visible');
                this.loveText.classList.remove('show');
                this.hint.classList.remove('up');
                
                this.typingIndex = 0;
                this.loveText.textContent = '';
                
                this.fallingPetals = [];
                this.ripples = [];
                this.fireworks = [];
                
                this.createParticles();
                this.createRoses();
                
                this.startAutoClick();
                
                this.animate();
            }
            
            startAutoClick() {
                if (this.autoClickTimer) clearInterval(this.autoClickTimer);
                
                this.autoClickTimer = setInterval(() => {
                    if (this.phase === 'bloom' || this.phase === 'disperse') {
                        this.handleClick(null, true);
                    }
                }, CONFIG.animation.autoClickInterval);
            }
            
            stopAutoClick() {
                if (this.autoClickTimer) {
                    clearInterval(this.autoClickTimer);
                    this.autoClickTimer = null;
                }
            }

            animate() {
                const now = Date.now();
                const elapsed = now - this.startTime;
                this.elapsed = elapsed;
                
                this.windOffset = Math.sin(now * 0.0008) * 0.5;
                
                if (this.shakeAmount > 0) {
                    this.shakeAmount *= 0.92;
                    if (this.shakeAmount < 0.5) this.shakeAmount = 0;
                }
                
                if (elapsed > CONFIG.animation.fadeDelay) {
                    if (this.phase !== 'disperse') {
                        this.roses.forEach(rose => {
                            for (let i = 0; i < CONFIG.rose.petalsPerRose; i++) {
                                this.fallingPetals.push(new FallingPetal(this.canvas, rose.x, rose.y));
                            }
                        });
                    }
                    this.phase = 'disperse';
                } else if (elapsed > CONFIG.animation.bloomDelay) {
                    if (this.phase !== 'bloom') {
                        this.hint.classList.add('up');
                        
                        if (elapsed > CONFIG.animation.bloomDelay + 500 && this.phase !== 'bloom') {
                            this.roses.forEach(rose => {
                                for (let i = 0; i < 3; i++) {
                                    this.fallingPetals.push(new FallingPetal(this.canvas, rose.x, rose.y));
                                }
                            });
                        }
                    }
                    this.phase = 'bloom';
                    this.textContainer.classList.add('visible');
                }
                
                if (elapsed > CONFIG.animation.typingStartDelay && !this.typingStarted) {
                    this.startTyping();
                    this.typingStarted = true;
                }
                
                this.render(elapsed);
                
                if (this.phase === 'disperse') {
                    const aliveParticles = this.particles.filter(p => p.alpha > 0);
                    const totalDuration = CONFIG.animation.duration;
                    const stopClickTime = totalDuration - 3000;
                    
                    if (elapsed > stopClickTime) {
                        this.stopAutoClick();
                    }
                    
                    if (elapsed >= totalDuration || aliveParticles.length === 0) {
                        if (this.isLooping) {
                            setTimeout(() => {
                                this.startAnimation();
                            }, 2000);
                        } else {
                            this.phase = 'idle';
                            return;
                        }
                    }
                }
                
                this.animationId = requestAnimationFrame(() => this.animate());
            }

            startTyping() {
                if (this.typingInterval) clearInterval(this.typingInterval);
                
                this.loveText.classList.add('show');
                this.typingIndex = 0;
                this.loveText.textContent = '';
                
                this.typingInterval = setInterval(() => {
                    if (this.typingIndex < this.typingText.length) {

                        this.typingIndex++;

                    { x: screenW * 0.25, y: screenH * 0.25, w: screenW * 0.50, h: screenH * 0.30 },
                    { x: screenW * 0.30, y: screenH * 0.50, w: screenW * 0.40, h: screenH * 0.12 },
                    { x: screenW * 0.15, y: screenH * 0.75, w: screenW * 0.70, h: screenH * 0.22 }
                ];
                
                const isInForbiddenZone = (x, y) => {
                    for (const zone of forbiddenZones) {
                        const margin = 20;
                        if (x + margin < zone.x + zone.w && x + quoteWidth - margin > zone.x &&
                            y + margin < zone.y + zone.h && y + quoteHeight - margin > zone.y) {
                            return true;
                        }
                    }
                    return false;
                };
                
                let preferredZones;
                if (isMobileDevice) {
                    preferredZones = [
                        { x: padding, y: padding, w: screenW - padding * 2, h: screenH * 0.20 },
                        { x: padding, y: screenH * 0.35, w: screenW - padding * 2, h: screenH * 0.15 },
                        { x: padding, y: screenH * 0.55, w: screenW - padding * 2, h: screenH * 0.15 }
                    ];
                } else {
                    preferredZones = [
                        { x: padding, y: padding, w: screenW * 0.35, h: screenH * 0.35 },
                        { x: screenW * 0.60, y: padding, w: screenW * 0.35, h: screenH * 0.35 },
                        { x: padding, y: screenH * 0.55, w: screenW * 0.35, h: screenH * 0.35 },
                        { x: screenW * 0.60, y: screenH * 0.55, w: screenW * 0.35, h: screenH * 0.35 }
                    ];
                }
                
                const getPositionFromZone = (zone) => {
                    const availableWidth = Math.max(0, zone.w - quoteWidth);
                    const availableHeight = Math.max(0, zone.h - quoteHeight);
                    return {
                        x: zone.x + (availableWidth > 0 ? Math.random() * availableWidth : 0),
                        y: zone.y + (availableHeight > 0 ? Math.random() * availableHeight : 0)
                    };
                };
                
                for (let i = 0; i < maxAttempts; i++) {
                    const zone = preferredZones[Math.floor(Math.random() * preferredZones.length)];
                    const pos = getPositionFromZone(zone);
                    const x = pos.x;
                    const y = pos.y;
                    
                    if (isInForbiddenZone(x, y)) continue;
                    
                    let overlap = false;
                    const minDistanceX = quoteWidth + 15;
                    const minDistanceY = quoteHeight + 20;
                    
                    for (const pos of this.quotePositions) {
                        const dx = Math.abs(x - pos.x);
                        const dy = Math.abs(y - pos.y);
                        if (dx < minDistanceX && dy < minDistanceY) {
                            overlap = true;
                            break;
                        }
                    }
                    
                    if (!overlap) {
                        return { x, y };
                    }
                }
                
                const fallbackZone = preferredZones[Math.floor(Math.random() * preferredZones.length)];
                return getPositionFromZone(fallbackZone);
            }
            
            showLoveQuote(text) {
                if (this.activeQuotes.length >= 4) return;
                
                const quote = document.createElement('div');
                quote.className = 'love-quote';
                quote.textContent = text;
                
                const pos = this.getNonOverlappingPosition();
                quote.style.left = pos.x + 'px';
                quote.style.top = pos.y + 'px';
                
                this.quotePositions.push(pos);
                this.activeQuotes.push(quote);
                
                document.body.appendChild(quote);
                
                setTimeout(() => {
                    quote.classList.add('show');
                }, 50);
                
                const removeQuote = () => {
                    quote.classList.add('fade-out');
                    setTimeout(() => {
                        document.body.removeChild(quote);
                        const idx = this.activeQuotes.indexOf(quote);
                        if (idx > -1) {
                            this.activeQuotes.splice(idx, 1);
                            this.quotePositions.splice(idx, 1);
                        }
                    }, 1000);
                };
                
                setTimeout(removeQuote, 6000);
            }

            render(elapsed) {
                this.backgroundPhase += 0.002;
                
                this.drawDynamicBackground();
                
                if (this.shakeAmount > 0.5) {
                    this.ctx.save();
                    this.ctx.translate(
                        (Math.random() - 0.5) * this.shakeAmount,
                        (Math.random() - 0.5) * this.shakeAmount
                    );
                }
                
                this.fog.forEach(f => {
                    f.update();
                    f.draw(this.ctx);
                });
                
                this.stars.forEach(s => {
                    s.update();
                    s.draw(this.ctx);
                });
                
                this.updateRoses(elapsed);
                
                this.roses.forEach(rose => {
                    rose.draw(this.ctx);
                });
                
                this.fallingPetals = this.fallingPetals.filter(p => {
                    if (p.update(this.windOffset)) {
                        p.draw(this.ctx);
                        return true;
                    }
                    return false;
                });
                
                if (Math.random() < 0.03 && (this.phase === 'bloom' || this.phase === 'disperse')) {
                    const rose = this.roses[Math.floor(Math.random() * this.roses.length)];
                    this.fallingPetals.push(new FallingPetal(this.canvas, rose.x, rose.y));
                }
                
                this.particles.forEach(particle => {
                    if (particle.update(this.phase, elapsed)) {
                        particle.draw(this.ctx);
                    }
                });
                
                this.ripples = this.ripples.filter(r => {
                    if (r.update()) {
                        r.draw(this.ctx);
                        return true;
                    }
                    return false;
                });
                
                this.fireworks = this.fireworks.filter(f => {
                    if (f.update()) {
                        f.draw(this.ctx);
                        return true;
                    }
                    return false;
                });
                
                if (this.phase === 'gather') {
                    this.drawCenterShape(elapsed);
                }
                
                if (this.shakeAmount > 0.5) {
                    this.ctx.restore();
                }
            }

            drawDynamicBackground() {
                const t = this.backgroundPhase;
                const gradient = this.ctx.createLinearGradient(
                    Math.sin(t) * 100, Math.cos(t) * 100,
                    this.canvas.width + Math.sin(t + Math.PI) * 100,
                    this.canvas.height + Math.cos(t + Math.PI) * 100
                );
                
                const c1 = 'rgb(13, 13, 26)';
                const c2 = 'rgb(26, 10, 26)';
                const c3 = 'rgb(18, 8, 20)';
                
                gradient.addColorStop(0, c1);
                gradient.addColorStop(0.35 + Math.sin(t) * 0.1, c2);
                gradient.addColorStop(0.7 + Math.cos(t) * 0.1, c3);
                gradient.addColorStop(1, c1);
                
                this.ctx.fillStyle = gradient;
                this.ctx.fillRect(0, 0, this.canvas.width, this.canvas.height);
                
                this.ctx.fillStyle = 'rgba(13, 13, 26, 0.12)';
                this.ctx.fillRect(0, 0, this.canvas.width, this.canvas.height);
            }

            drawCenterShape(elapsed) {
                const centerX = this.canvas.width / 2;
                const centerY = this.canvas.height / 2;
                const heartbeat = Math.sin(elapsed * CONFIG.animation.heartbeatSpeed) * 0.06 + 1;

                this.ctx.save();
                this.ctx.translate(centerX, centerY);
                this.ctx.scale(heartbeat, heartbeat);
                
                this.ctx.shadowBlur = 40;
                this.ctx.shadowColor = 'rgba(255, 75, 122, 0.7)';
                
                const fontSize = Math.min(this.canvas.width * 0.18, 140);
                this.ctx.font = `900 ${fontSize}px Microsoft YaHei`;
                this.ctx.textAlign = 'center';
                this.ctx.textBaseline = 'middle';
                
                const gradient = this.ctx.createLinearGradient(-fontSize * 1.5, 0, fontSize * 1.5, 0);
                gradient.addColorStop(0, '#ff4b7a');
                gradient.addColorStop(0.33, '#ff8fab');
                gradient.addColorStop(0.5, '#ffc0cb');
                gradient.addColorStop(0.66, '#ff8fab');
                gradient.addColorStop(1, '#ff4b7a');
                
                this.ctx.shadowBlur = 60;
                this.ctx.shadowColor = 'rgba(255, 75, 122, 0.6)';
                this.ctx.fillStyle = gradient;
                this.ctx.fillText('520', 0, 0);
                
                this.ctx.shadowBlur = 25;
                this.ctx.shadowColor = 'rgba(255, 255, 255, 0.3)';
                this.ctx.fillStyle = 'rgba(255, 255, 255, 0.15)';
                this.ctx.fillText('520', -3, -3);
                
                this.drawDecorativeHearts(elapsed);
                
                this.ctx.restore();
            }

            drawDecorativeHearts(elapsed) {
                const time = elapsed * 0.0015;

                for (let i = 0; i < 6; i++) {
                    const angle = (i / 6) * Math.PI * 2 + time * 0.6;
                    const radius = 160 + Math.sin(time + i * 0.8) * 25;
                    const x = Math.cos(angle) * radius;
                    const y = Math.sin(angle) * radius;
                    const size = 14 + Math.sin(time * 2.2 + i) * 6;

                    const hueShift = i * 15;
                    this.ctx.fillStyle = `hsl(${350 + hueShift}, 70%, 70%)`;
                    this.ctx.globalAlpha = 0.55 + Math.sin(time + i) * 0.35;
                    this.drawHeartShape(this.ctx, x, y, size);
                }

                this.ctx.globalAlpha = 1;
            }

            drawHeartShape(ctx, x, y, size) {
                ctx.shadowBlur = 12;
                ctx.shadowColor = 'rgba(255, 107, 157, 0.6)';
                
                ctx.beginPath();
                ctx.moveTo(x, y + size / 2);
                ctx.bezierCurveTo(x, y, x - size, y, x - size, y + size / 2);
                ctx.bezierCurveTo(x - size, y + size, x, y + size * 1.2, x, y + size * 1.5);
                ctx.bezierCurveTo(x, y + size * 1.2, x + size, y + size, x + size, y + size / 2);
                ctx.bezierCurveTo(x + size, y, x, y, x, y + size / 2);
                ctx.fill();
                
                ctx.shadowBlur = 0;
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            new LoveAnimation();
        });
    </script>
</body>
