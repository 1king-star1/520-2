<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>520 心动时刻 💕</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            overflow: hidden;
            font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 25%, #0f3460 50%, #1a1a2e 75%, #16213e 100%);
            background-size: 400% 400%;
            animation: gradientShift 15s ease infinite;
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .container {
            position: relative;
            width: 100%;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            cursor: pointer;
        }

        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        .text-container {
            position: relative;
            z-index: 10;
            text-align: center;
            opacity: 0;
            transform: scale(0.8);
            transition: all 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .text-container.visible {
            opacity: 1;
            transform: scale(1);
        }

        .title {
            font-size: clamp(2rem, 10vw, 5rem);
            font-weight: 900;
            letter-spacing: 0.1em;
            background: linear-gradient(90deg, #ff4b7a, #ff6b9d, #ff8fab, #ffc0cb, #ff8fab, #ff6b9d, #ff4b7a);
            background-size: 300% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: shimmer 3s linear infinite, heartbeat 2.5s ease-in-out infinite;
            text-shadow: 0 0 40px rgba(255, 75, 122, 0.6), 0 0 80px rgba(255, 107, 157, 0.4);
            margin-bottom: 15px;
            position: relative;
        }

        .title::before, .title::after {
            content: '520';
            position: absolute;
            left: 0;
            width: 100%;
            font-size: inherit;
            font-weight: inherit;
            letter-spacing: inherit;
            -webkit-background-clip: text;
            background-clip: text;
        }

        .title::before {
            top: 3px;
            left: 3px;
            color: rgba(0, 0, 0, 0.4);
            z-index: -1;
        }

        .title::after {
            top: -1px;
            left: -1px;
            color: rgba(255, 255, 255, 0.3);
            z-index: -2;
        }

        @keyframes shimmer {
            0% { background-position: 0% center; }
            100% { background-position: 300% center; }
        }

        @keyframes heartbeat {
            0%, 100% { 
                transform: scale(0.92);
                text-shadow: 0 0 30px rgba(255, 75, 122, 0.5), 0 0 60px rgba(255, 107, 157, 0.3);
            }
            50% { 
                transform: scale(1.08);
                text-shadow: 0 0 50px rgba(255, 75, 122, 0.8), 0 0 100px rgba(255, 107, 157, 0.5);
            }
        }

        .subtitle {
            font-size: clamp(1rem, 3vw, 1.6rem);
            color: rgba(255, 182, 193, 0.95);
            letter-spacing: 0.5em;
            margin-bottom: 25px;
            text-shadow: 0 0 20px rgba(255, 182, 193, 0.5);
        }

        .love-quote {
            position: absolute;
            font-size: clamp(0.8rem, 4.2vw, 1.2rem);
            font-weight: 600;
            background: linear-gradient(135deg, #ffd700 0%, #ffb347 30%, #ff8c00 50%, #ffb347 70%, #ffd700 100%);
            background-size: 200% 200%;
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 0.1em;
            text-shadow: 0 0 30px rgba(255, 183, 71, 0.9), 0 0 60px rgba(255, 140, 0, 0.6), 0 0 100px rgba(255, 215, 0, 0.4);
            opacity: 0;
            pointer-events: none;
            white-space: normal;
            max-width: 85%;
            text-align: center;
            z-index: 20;
            animation: quoteFloat 4s ease-in-out infinite, quoteGlow 2s ease-in-out infinite, quoteGradient 3s ease infinite;
        }

        .love-quote.show {
            opacity: 1;
        }

        .love-quote.fade-out {
            opacity: 0;
            transition: opacity 1s ease-out;
        }

        @keyframes quoteFloat {
            0%, 100% { transform: translateY(0) rotate(-2deg); }
            50% { transform: translateY(-15px) rotate(2deg); }
        }

        @keyframes quoteGlow {
            0%, 100% { text-shadow: 0 0 30px rgba(255, 75, 122, 0.9), 0 0 60px rgba(255, 107, 157, 0.6), 0 0 100px rgba(221, 160, 221, 0.4); }
            50% { text-shadow: 0 0 45px rgba(255, 75, 122, 1), 0 0 90px rgba(255, 107, 157, 0.8), 0 0 130px rgba(221, 160, 221, 0.6); }
        }

        @keyframes quoteGradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .hint {
            font-size: clamp(0.9rem, 2.5vw, 1.2rem);
            color: rgba(255, 182, 193, 0.7);
            animation: pulse 2s ease-in-out infinite;
            position: relative;
        }

        .hint.up {
            transform: translateY(-80px);
            opacity: 0;
            transition: all 0.8s ease;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.5; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.05); }
        }

        .love-text {
            position: absolute;
            bottom: 20%;
            left: 50%;
            transform: translateX(-50%);
            font-size: clamp(1rem, 3vw, 1.6rem);
            color: rgba(255, 107, 157, 0);
            opacity: 0;
            white-space: nowrap;
            transition: all 1.5s ease;
            text-shadow: 0 0 30px rgba(255, 107, 157, 0.9), 0 0 60px rgba(255, 139, 182, 0.5);
            letter-spacing: 0.05em;
        }

        .love-text.show {
            opacity: 1;
            color: rgba(255, 107, 157, 0.95);
            animation: textFloat 3s ease-in-out infinite;
        }

        @keyframes textFloat {
            0%, 100% { transform: translateX(-50%) translateY(0); }
            50% { transform: translateX(-50%) translateY(-10px); }
        }

        .controls {
            position: absolute;
            bottom: 20px;
            right: 20px;
            z-index: 20;
            display: flex;
            gap: 10px;
        }

        .control-btn {
            background: rgba(255, 107, 157, 0.2);
            border: 1px solid rgba(255, 107, 157, 0.4);
            color: rgba(255, 182, 193, 0.9);
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.3s ease;
        }

        .control-btn:hover {
            background: rgba(255, 107, 157, 0.4);
            transform: scale(1.05);
        }

        .control-btn.active {
            background: rgba(255, 107, 157, 0.6);
        }

        .quiz-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #1a0a1f 0%, #2d1b36 50%, #1a0a1f 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            overflow: hidden;
        }

        .quiz-background {
            position: absolute;
            width: 100%;
            height: 100%;
            opacity: 0.3;
        }

        .quiz-container {
            position: relative;
            background: rgba(255, 75, 122, 0.1);
            backdrop-filter: blur(20px);
            border: 2px solid rgba(255, 107, 157, 0.5);
            border-radius: 30px;
            padding: 40px 30px;
            max-width: 90%;
            width: 420px;
            text-align: center;
            box-shadow: 0 0 60px rgba(255, 75, 122, 0.3), 0 0 100px rgba(255, 107, 157, 0.2);
            animation: quizFadeIn 0.8s ease-out;
        }

        @keyframes quizFadeIn {
            0% { opacity: 0; transform: scale(0.8) translateY(20px); }
            100% { opacity: 1; transform: scale(1) translateY(0); }
        }

        .quiz-title {
            font-size: clamp(1.8rem, 6vw, 2.5rem);
            font-weight: 900;
            background: linear-gradient(135deg, #ff6b9d 0%, #ff4b7a 50%, #ffc0cb 100%);
            background-size: 200% 200%;
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shimmer 3s linear infinite;
            margin-bottom: 10px;
        }

        .quiz-subtitle {
            font-size: clamp(0.9rem, 3vw, 1.1rem);
            color: rgba(255, 182, 193, 0.8);
            margin-bottom: 30px;
            letter-spacing: 0.15em;
        }

        .quiz-question {
            font-size: clamp(1.1rem, 4vw, 1.4rem);
            color: rgba(255, 182, 193, 0.95);
            margin-bottom: 25px;
            line-height: 1.6;
            min-height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .quiz-input {
            width: 100%;
            padding: 18px 25px;
            font-size: clamp(1rem, 4vw, 1.2rem);
            border: 2px solid rgba(255, 107, 157, 0.4);
            border-radius: 15px;
            background: rgba(255, 75, 122, 0.1);
            color: #fff;
            text-align: center;
            outline: none;
            transition: all 0.3s ease;
            box-sizing: border-box;
        }

        .quiz-input:focus {
            border-color: rgba(255, 107, 157, 0.8);
            box-shadow: 0 0 30px rgba(255, 75, 122, 0.3);
        }

        .quiz-input::placeholder {
            color: rgba(255, 182, 193, 0.4);
        }

        .quiz-btn {
            margin-top: 25px;
            padding: 15px 50px;
            font-size: clamp(1rem, 4vw, 1.2rem);
            font-weight: 600;
            border: none;
            border-radius: 30px;
            background: linear-gradient(135deg, #ff4b7a 0%, #ff6b9d 100%);
            color: #fff;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 20px rgba(255, 75, 122, 0.4);
        }

        .quiz-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 30px rgba(255, 75, 122, 0.6);
        }

        .quiz-btn:active {
            transform: translateY(-1px);
        }

        .quiz-feedback {
            margin-top: 20px;
            font-size: clamp(0.9rem, 3vw, 1rem);
            min-height: 30px;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .quiz-feedback.correct {
            opacity: 1;
            color: #ff6b9d;
            text-shadow: 0 0 20px rgba(255, 107, 157, 0.8);
        }

        .quiz-feedback.wrong {
            opacity: 1;
            color: #ff4444;
        }

        .quiz-heart {
            position: absolute;
            font-size: 1.5rem;
            opacity: 0;
            animation: heartFloat 2s ease-out infinite;
        }

        @keyframes heartFloat {
            0% { opacity: 0; transform: translateY(0) scale(1); }
            20% { opacity: 1; }
            100% { opacity: 0; transform: translateY(-100px) scale(0.5); }
        }

        .quiz-progress {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-bottom: 20px;
        }

        .progress-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: rgba(255, 107, 157, 0.3);
            transition: all 0.3s ease;
        }

        .progress-dot.active {
            background: rgba(255, 107, 157, 0.9);
            box-shadow: 0 0 10px rgba(255, 107, 157, 0.8);
        }

        .spank-animation {
            width: 150px;
            height: 120px;
            margin: 0 auto;
            position: relative;
            animation: spank 0.35s ease-in-out infinite;
        }

        .spank-animation::before {
            content: '🍑';
            font-size: 60px;
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            animation: shake 0.08s ease-in-out infinite, redGlow 0.35s ease-in-out infinite;
            filter: drop-shadow(0 4px 8px rgba(255, 107, 157, 0.5));
        }

        .spank-animation::after {
            content: '✋';
            font-size: 50px;
            position: absolute;
            right: -25px;
            top: 25%;
            animation: handSpank 0.35s ease-in-out infinite;
            filter: drop-shadow(0 4px 8px rgba(0, 0, 0, 0.3));
        }

        @keyframes spank {
            0%, 100% { transform: rotate(0deg) scale(1); }
            25% { transform: rotate(-8deg) scale(1.02); }
            50% { transform: rotate(0deg) scale(0.98); }
            75% { transform: rotate(8deg) scale(1.02); }
        }

        @keyframes shake {
            0%, 100% { transform: translate(-50%, -50%) rotate(0deg) scale(1); }
            20% { transform: translate(-46%, -54%) rotate(-15deg) scale(1.05); }
            40% { transform: translate(-54%, -46%) rotate(15deg) scale(0.95); }
            60% { transform: translate(-48%, -52%) rotate(-10deg) scale(1.02); }
            80% { transform: translate(-52%, -48%) rotate(10deg) scale(0.98); }
        }

        @keyframes handSpank {
            0%, 100% { transform: translateX(0) rotate(0deg) scale(1); }
            30% { transform: translateX(-35px) rotate(-15deg) scale(1.2); }
            50% { transform: translateX(-40px) rotate(-20deg) scale(1.3); }
            70% { transform: translateX(-35px) rotate(-15deg) scale(1.1); }
        }

        @keyframes redGlow {
            0%, 45% { filter: drop-shadow(0 4px 8px rgba(255, 107, 157, 0.5)); }
            50% { filter: drop-shadow(0 0 20px rgba(255, 0, 0, 0.8)) drop-shadow(0 4px 8px rgba(255, 107, 157, 0.5)); }
            55% { filter: drop-shadow(0 0 30px rgba(255, 0, 0, 1)) drop-shadow(0 4px 8px rgba(255, 107, 157, 0.5)); }
            60% { filter: drop-shadow(0 0 20px rgba(255, 0, 0, 0.8)) drop-shadow(0 4px 8px rgba(255, 107, 157, 0.5)); }
            65%, 100% { filter: drop-shadow(0 4px 8px rgba(255, 107, 157, 0.5)); }
        }

        /* 全屏闪烁星光 */
        .twinkle-stars {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 3;
            overflow: hidden;
        }

        .twinkle-star {
            position: absolute;
            background: white;
            border-radius: 50%;
            animation: twinkle ease-in-out infinite;
            box-shadow: 0 0 6px 2px rgba(255, 200, 220, 0.5);
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.2; transform: scale(0.8); }
            50% { opacity: 1; transform: scale(1.2); }
        }

        /* 3D旋转相册 */
        .carousel-container {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 220px;
            height: 220px;
            perspective: 1000px;
            z-index: 5;
            opacity: 0;
            transition: opacity 2s ease;
        }

        .carousel-container.show {
            opacity: 1;
        }

        .carousel {
            width: 100%;
            height: 100%;
            position: absolute;
            transform-style: preserve-3d;
            animation: rotate3d 15s linear infinite;
        }

        .carousel-item {
            position: absolute;
            width: 160px;
            height: 160px;
            background: rgba(255, 107, 157, 0.15);
            backdrop-filter: blur(10px);
            border: 2px solid rgba(255, 107, 157, 0.6);
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            backface-visibility: hidden;
            box-shadow: 0 0 20px rgba(255, 107, 157, 0.3);
        }

        .carousel-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 12px;
            transition: opacity 0.2s ease;
        }

        .carousel-item:nth-child(1) { transform: rotateY(0deg) translateZ(220px); }
        .carousel-item:nth-child(2) { transform: rotateY(72deg) translateZ(220px); }
        .carousel-item:nth-child(3) { transform: rotateY(144deg) translateZ(220px); }
        .carousel-item:nth-child(4) { transform: rotateY(216deg) translateZ(220px); }
        .carousel-item:nth-child(5) { transform: rotateY(288deg) translateZ(220px); }

        @keyframes rotate3d {
            0% { transform: rotateY(0deg); }
            100% { transform: rotateY(360deg); }
        }
    </style>
</head>
<body>
    <!-- 全屏闪烁星光 -->
    <div class="twinkle-stars" id="twinkleStars"></div>

    <!-- 3D旋转相册 -->
    <div class="carousel-container" id="carouselContainer">
        <div class="carousel">
            <div class="carousel-item">
                <img src="https://img.cdn1.vip/i/6a0b39e4019a5_1779120612.webp" alt="照片1" data-alt="https://img.cdn1.vip/i/6a0b3ee27d2d3_1779121890.webp">
            </div>
            <div class="carousel-item">
                <img src="https://img.cdn1.vip/i/6a0b39e16676a_1779120609.webp" alt="照片2" data-alt="https://img.cdn1.vip/i/6a0b3ee0c4dd7_1779121888.webp">
            </div>
            <div class="carousel-item">
                <img src="https://img.cdn1.vip/i/6a0b39e590bc9_1779120613.webp" alt="照片3" data-alt="https://img.cdn1.vip/i/6a0b3ee733ace_1779121895.webp">
            </div>
            <div class="carousel-item">
                <img src="https://img.cdn1.vip/i/6a0b39e884111_1779120616.webp" alt="照片4" data-alt="https://img.cdn1.vip/i/6a0b3eea75c02_1779121898.webp">
            </div>
            <div class="carousel-item">
                <img src="https://img.cdn1.vip/i/6a0b39ea65da4_1779120618.webp" alt="照片5" data-alt="https://img.cdn1.vip/i/6a0b3ee5b0b46_1779121893.webp">
            </div>
        </div>
    </div>

    <div class="quiz-overlay" id="quizOverlay">
        <div class="quiz-background" id="quizBackground"></div>
        <div class="quiz-container">
            <div class="quiz-title">💗 520 心动测试 💗</div>
            <div class="quiz-subtitle">写下你的答案，解锁我们的专属心动✨</div>
            <div class="quiz-progress" id="quizProgress"></div>
            <div class="quiz-question" id="quizQuestion"></div>
            <input type="text" class="quiz-input" id="quizInput" placeholder="写下你的答案，开启我们的心动瞬间～">
            <button class="quiz-btn" id="quizBtn">揭晓心动答案</button>
            <div class="quiz-feedback" id="quizFeedback"></div>
        </div>
    </div>

    <div class="container" id="container">
        <canvas id="particleCanvas"></canvas>

        <div class="text-container" id="textContainer">
            <div class="title">520</div>
            <div class="subtitle">我爱你</div>
            <div class="hint" id="hint">点屏幕有惊喜...</div>
        </div>

        <div class="love-text" id="loveText">
            ❤️ 大笨蛋，遇见你是我最美的意外 ❤️
        </div>

        <div class="controls">
            <button class="control-btn" id="loopBtn">循环播放</button>
            <button class="control-btn" id="soundBtn">🔊 音效</button>
        </div>
    </div>

    <script>
        // ========== 问答验证系统 ==========
        const quizQuestions = [
            {
                question: '🌹 你是谁？',
                answers: [
                    { text: '涂盼盼', feedback: '😘 嘿嘿，不愧是我的宝贝，连自己名字都记得这么清楚～' },
                    { text: '大笨蛋', feedback: '😜 敢说自己是大笨蛋，不愧是我的大笨蛋～' },
                    { text: '小可爱', feedback: '🥰 没错没错，你就是我的小可爱，么么哒～' },
                    { text: '小笨蛋', feedback: '😝 小笨蛋～，哈哈～～,没错是我大坏蛋的专属小仙女！' }
                ]
            },
            {
                question: '💗 今天是什么节？',
                answers: [
                    { text: '520', feedback: '💖 嘻嘻！520我爱你～答对啦，今晚有奖励哦！' },
                    { text: '521', feedback: '💝 521我愿意～嘻嘻，也行啦，反正都是爱你的日子！' }
                ]
            },
            {
                question: '💘 男朋友是谁？',
                answers: [
                    { text: '王星', feedback: '😍 嘿嘿～被你发现啦！没错就是我这个大坏蛋～' },
                    { text: '大坏蛋', feedback: '😈 哈哈，大坏蛋来啦！今晚要好好欺负你～' }
                ]
            },
            {
                question: '💕 我们要一起多久？',
                answers: [
                    { text: '很久', feedback: '🤗 很久不够哦～要更久更久才行！' },
                    { text: '永远', feedback: '💞 永远永远！生生世世都要在一起～' },
                    { text: '一辈子', feedback: '❤️ 一辈子太短啦～下辈子也要找到你！' },
                    { text: '每一天', feedback: '☀️ 对呀！从今天开始的每一天都要在一起～' }
                ]
            }
        ];

        let currentQuestionIndex = 0;
        let wrongCount = 0;
        let quizOverlay, quizQuestion, quizInput, quizBtn, quizFeedback, quizProgress;
        let globalAudioManager = null;

        function initQuiz() {
            quizOverlay = document.getElementById('quizOverlay');
            quizQuestion = document.getElementById('quizQuestion');
            quizInput = document.getElementById('quizInput');
            quizBtn = document.getElementById('quizBtn');
            quizFeedback = document.getElementById('quizFeedback');
            quizProgress = document.getElementById('quizProgress');

            if (!globalAudioManager) {
                    globalAudioManager = new AudioManager();
                    globalAudioManager.init();
                    globalAudioManager.playBackgroundMusic('quiz');
                }

            renderProgress();
            showCurrentQuestion();

            quizBtn.addEventListener('click', checkAnswer);
            quizInput.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') checkAnswer();
            });

            document.addEventListener('click', function startMusic() {
                if (globalAudioManager) {
                    globalAudioManager.playBackgroundMusic('quiz');
                }
                document.removeEventListener('click', startMusic);
            }, { once: true });

            createQuizHearts();
        }

        function renderProgress() {
            quizProgress.innerHTML = '';
            for (let i = 0; i < quizQuestions.length; i++) {

        // ========== 粒子对象池 ==========
        class ParticlePool {
            constructor(canvas, size) {
                this.canvas = canvas;
                this.pool = [];
                this.active = [];
                this.size = size;
                this.init();
            }

            init() {
                for (let i = 0; i < this.size; i++) {
                    this.pool.push(new Particle(this.canvas, true));
                }
            }

            get() {
                if (this.pool.length > 0) {
                    const p = this.pool.pop();
                    p.reset();
                    this.active.push(p);
                    return p;
                }
                const p = new Particle(this.canvas, false);
                this.active.push(p);
                return p;
            }

            recycle(particle) {
                particle.reset();
                this.pool.push(particle);
                const idx = this.active.indexOf(particle);
                if (idx > -1) this.active.splice(idx, 1);
            }

            getAll() {
                return this.active;
            }
        }

        // ========== 粒子类 ==========
        class Particle {
            constructor(canvas, inPool = false) {
                this.canvas = canvas;
                this.inPool = inPool;
                this.reset();
            }

            reset() {
                this.x = Math.random() * this.canvas.width;
                this.y = Math.random() * this.canvas.height;
                this.targetX = this.canvas.width / 2;
                this.targetY = this.canvas.height / 2;
                this.vx = (Math.random() - 0.5) * CONFIG.particle.speed;
                this.vy = (Math.random() - 0.5) * CONFIG.particle.speed;
                this.size = Math.random() * CONFIG.particle.size + 1.5;
                this.baseSize = this.size;
                this.colors = [
                    CONFIG.colors.primary, CONFIG.colors.secondary, CONFIG.colors.tertiary
                ];
                this.color = this.colors[Math.floor(Math.random() * this.colors.length)];
                this.alpha = Math.random() * 0.4 + 0.6;
                this.bloomAngle = Math.random() * Math.PI * 2;
                this.bloomSpeed = Math.random() * 3 + 1.5;
                this.heartbeat = Math.random() * Math.PI * 2;
                this.trail = [];
                this.maxTrail = CONFIG.particle.trailLength;
                this.currentPhaseColors = this.colors;
                this.distToCenter = this.calculateDistToCenter();
            }

            calculateDistToCenter() {
                const cx = this.canvas.width / 2;
                const cy = this.canvas.height / 2;
                return Math.sqrt((this.x - cx) ** 2 + (this.y - cy) ** 2);
            }

            isInViewport() {
                const margin = 100;
                return this.x > -margin && this.x < this.canvas.width + margin &&
                       this.y > -margin && this.y < this.canvas.height + margin;
            }

            update(phase, elapsed) {
                this.heartbeat += 0.06;
                const pulse = 1 + Math.sin(this.heartbeat) * 0.3;
                this.size = this.baseSize * pulse;

                this.distToCenter = this.calculateDistToCenter();
                const maxDist = Math.max(this.canvas.width, this.canvas.height) / 2;
                const distRatio = Math.min(this.distToCenter / maxDist, 1);

                if (phase === 'gather') {
                    const dx = this.targetX - this.x;
                    const dy = this.targetY - this.y;
                    const attraction = 0.003 + (1 - distRatio) * 0.004;
                    this.vx += dx * attraction;
                    this.vy += dy * attraction;
                    this.vx *= 0.97;
                    this.vy *= 0.97;
                    this.updateColor(phase);
                } else if (phase === 'bloom') {
                    const bloomForce = 0.15 + distRatio * 0.1;
                    this.vx += Math.cos(this.bloomAngle) * this.bloomSpeed * bloomForce;
                    this.vy += Math.sin(this.bloomAngle) * this.bloomSpeed * bloomForce;
                    this.bloomAngle += 0.025;
                    this.vx *= 0.985;
                    this.vy *= 0.985;
                    this.updateColor(phase);
                } else if (phase === 'disperse') {
                    this.vy -= 0.35 + distRatio * 0.15;
                    this.vx += (Math.random() - 0.5) * 0.5;
                    this.alpha -= 0.015;
                    this.updateColor(phase);
                }

                this.x += this.vx;
                this.y += this.vy;

                this.trail.push({ x: this.x, y: this.y, alpha: this.alpha });
                if (this.trail.length > this.maxTrail) {
                    this.trail.shift();
                }

                if (phase === 'disperse') {
                    if (this.y < -100 || this.alpha <= 0) {
                        this.alpha = 0;
                        return false;
                    }
                } else {
                    if (this.x < -50) this.x = this.canvas.width + 50;
                    if (this.x > this.canvas.width + 50) this.x = -50;
                    if (this.y < -50) this.y = this.canvas.height + 50;
                    if (this.y > this.canvas.height + 50) this.y = -50;
                }

                return this.alpha > 0;
            }

            updateColor(phase) {
                if (phase === 'gather') {
                    this.currentPhaseColors = [CONFIG.colors.secondary, CONFIG.colors.tertiary, CONFIG.colors.accent];
                } else if (phase === 'bloom') {
                    this.currentPhaseColors = [CONFIG.colors.primary, CONFIG.colors.secondary, CONFIG.colors.purple];
                } else if (phase === 'disperse') {
                    this.currentPhaseColors = [CONFIG.colors.tertiary, CONFIG.colors.purple, CONFIG.colors.accent];
                }
                if (Math.random() < 0.02) {
                    this.color = this.currentPhaseColors[Math.floor(Math.random() * this.currentPhaseColors.length)];
                }
            }

            draw(ctx) {
                if (!this.isInViewport()) return;

                ctx.save();
                
                for (let i = 0; i < this.trail.length; i++) {
                    const t = this.trail[i];
                    const trailAlpha = (i / this.trail.length) * this.alpha * 0.4;
                    ctx.globalAlpha = trailAlpha;
                    ctx.fillStyle = this.color;
                    const trailSize = this.size * (i / this.trail.length) * 0.6;
                    this.drawHeart(ctx, t.x, t.y, trailSize);
                }

                ctx.globalAlpha = this.alpha;
                ctx.fillStyle = this.color;
                this.drawHeart(ctx, this.x, this.y, this.size);

                ctx.restore();
            }

            drawHeart(ctx, x, y, size) {
                ctx.beginPath();
                const w = size * 2;
                const h = size * 2;

                ctx.moveTo(x, y + h / 4);
                ctx.bezierCurveTo(x, y, x - w / 2, y, x - w / 2, y + h / 4);
                ctx.bezierCurveTo(x - w / 2, y + h / 2, x, y + h * 0.7, x, y + h);
                ctx.bezierCurveTo(x, y + h * 0.7, x + w / 2, y + h / 2, x + w / 2, y + h / 4);
                ctx.bezierCurveTo(x + w / 2, y, x, y, x, y + h / 4);

                ctx.shadowBlur = 8;
                ctx.shadowColor = this.color;
                ctx.fill();
                ctx.shadowBlur = 0;
            }
        }

        // ========== 玫瑰花类 ==========
        class RoseFlower {
            constructor(canvas, x, y, radius) {
                this.canvas = canvas;
                this.x = x;
                this.y = y;
                this.radius = radius;
                this.baseAlpha = 0.12;
                this.pulse = Math.random() * Math.PI * 2;
                this.bloomPhase = 0;
                this.petalRotation = Math.random() * Math.PI * 2;
                this.swayPhase = Math.random() * Math.PI * 2;
                this.swayOffset = Math.random() * Math.PI;
                this.lightPhase = Math.random() * Math.PI * 2;
                this.fadeOut = false;
                this.fadeOutPhase = 0;
                this.bloomCyclePhase = 0;
                this.isLooping = false;
            }

            update(elapsed, windOffset) {
                this.pulse += 0.025;
                this.swayPhase += 0.015;
                this.lightPhase += 0.02;

                const bloomDelay = CONFIG.animation.bloomDelay;
                const bloomDuration = CONFIG.rose.bloomDuration;
                const loopInterval = CONFIG.rose.loopInterval;

                if (!this.fadeOut) {
                    if (elapsed > bloomDelay) {
                        const bloomElapsed = elapsed - bloomDelay;
                        
                        if (bloomElapsed > bloomDuration + 2000) {
                            this.isLooping = true;
                        }
                        
                        if (this.isLooping) {
                            const cycleElapsed = bloomElapsed - bloomDuration - 2000;
                            this.bloomCyclePhase = (cycleElapsed % loopInterval) / loopInterval;
                            
                            if (this.bloomCyclePhase < 0.5) {
                                this.bloomPhase = 0.3 + this.bloomCyclePhase * 1.4;
                            } else {
                                this.bloomPhase = 1 - (this.bloomCyclePhase - 0.5) * 1.4;
                            }
                        } else {
                            this.bloomPhase = Math.min(1, bloomElapsed / bloomDuration);
                        }
                    }
                } else {
                    this.fadeOutPhase += 0.015;
                    if (this.fadeOutPhase >= 1) {
                        this.fadeOutPhase = 1;
                    }
                }

                this.petalRotation += 0.005;
                this.swayPhase += windOffset * 0.01;
            }

            startFadeOut() {
                this.fadeOut = true;
                this.fadeOutPhase = 0;
            }

            isFullyFaded() {
                return this.fadeOut && this.fadeOutPhase >= 1;
            }

            draw(ctx) {
                ctx.save();
                
                let overallAlpha = this.baseAlpha + this.bloomPhase * 0.22;
                
                if (this.fadeOut) {
                    overallAlpha *= (1 - this.fadeOutPhase);
                }
                
                ctx.globalAlpha = Math.max(0, overallAlpha);
                ctx.translate(this.x, this.y);
                
                const lightMod = 0.85 + Math.sin(this.lightPhase) * 0.15;
                
                ctx.shadowBlur = 50;
                ctx.shadowColor = `rgba(255, 75, 122, ${0.5 * lightMod})`;
                
                this.drawRose(ctx, this.radius, this.fadeOut ? 0 : this.bloomPhase);
                this.drawGlowAura(ctx, this.radius);
                
                ctx.restore();
            }

            drawGlowAura(ctx, size) {
                const grad = ctx.createRadialGradient(0, 0, size * 0.4, 0, 0, size * 1.8);
                grad.addColorStop(0, 'rgba(255, 139, 182, 0.18)');
                grad.addColorStop(0.4, 'rgba(255, 107, 157, 0.1)');
                grad.addColorStop(1, 'transparent');
                
                ctx.fillStyle = grad;
                ctx.beginPath();
                ctx.arc(0, 0, size * 1.8, 0, Math.PI * 2);
                ctx.fill();
            }

            drawRose(ctx, size, bloomPhase) {
                const petalCount = 8;
                const layerCount = 3;
                const eased = easeOutBack(Math.min(1, bloomPhase));

                for (let layer = layerCount - 1; layer >= 0; layer--) {
                    const layerDelay = layer * 0.2;
                    const layerPhase = Math.max(0, bloomPhase - layerDelay);
                    const layerEased = easeOutBack(Math.min(1, layerPhase));
                    const layerOffset = layer * 0.4;
                    const layerSize = size * (1 - layer * 0.15);
                    const sway = Math.sin(this.swayPhase + layer * 0.9 + this.swayOffset) * 0.07;
                    const layerAlpha = 1 - layer * 0.38;

                    for (let i = 0; i < petalCount; i++) {
                        const petalOffset = i * 0.15;
                        const angle = (i / petalCount) * Math.PI * 2 + this.petalRotation + layerOffset + petalOffset;
                        const petalVariation = 0.78 + Math.sin(i * 1.1 + layer) * 0.22;
                        const petalSize = layerSize * petalVariation;

                        ctx.save();
                        ctx.rotate(angle + sway);
                        ctx.translate(0, -layerSize * 0.12 * layerEased);
                        ctx.globalAlpha *= layerAlpha;
                        
                        const petalOpen = this.calculatePetalOpen(layerPhase, i, petalCount);
                        this.drawPetal(ctx, 0, 0, petalSize, layerPhase, petalOpen, layer);
                        
                        ctx.restore();
                    }
                }

                if (bloomPhase > 0.25) {
                    const centerPhase = (bloomPhase - 0.25) / 0.75;
                    const centerSize = easeOutCubic(Math.min(1, centerPhase));

                    ctx.shadowBlur = 25;
                    ctx.shadowColor = 'rgba(255, 235, 120, 0.5)';

                    const grad = ctx.createRadialGradient(0, 0, 0, 0, 0, size * 0.28);
                    grad.addColorStop(0, 'rgba(255, 240, 150, 0.6)');
                    grad.addColorStop(0.4, 'rgba(255, 192, 203, 0.4)');
                    grad.addColorStop(1, 'rgba(255, 139, 182, 0.15)');

                    ctx.fillStyle = grad;
                    ctx.beginPath();
                    ctx.arc(0, 0, size * 0.2 * centerSize, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.shadowBlur = 0;
                }
            }

            calculatePetalOpen(phase, petalIndex, totalPetals) {
                if (phase <= 0) return 0.18;
                const baseOpen = 0.28;
                const maxOpen = 0.95;
                const progress = easeOutBack(Math.min(1, phase));
                return baseOpen + (maxOpen - baseOpen) * progress;
            }

            drawPetal(ctx, x, y, size, bloomPhase, petalOpen, layer) {
                const grad = ctx.createRadialGradient(x, y - size * 0.3, 0, x, y, size);
                const hueShift = layer * 10;
                
                grad.addColorStop(0, `hsla(${348 - hueShift}, 65%, 88%, 0.75)`);
                grad.addColorStop(0.4, `hsla(${352 - hueShift}, 60%, 72%, 0.55)`);
                grad.addColorStop(1, `hsla(${352 - hueShift}, 52%, 62%, 0.18)`);

                ctx.fillStyle = grad;
                ctx.beginPath();

                const widthFactor = 0.28 + petalOpen * 0.68;
                const petalLength = size * (0.68 + bloomPhase * 0.28);

                const cp1x = x - size * 0.48 * widthFactor;
                const cp1y = y + size * 0.09;
                const cp2x = x - size * 0.28 * widthFactor;
                const cp2y = y - petalLength * 0.58;
                const topX = x;
                const topY = y - petalLength;
                const cp3x = x + size * 0.28 * widthFactor;
                const cp3y = y - petalLength * 0.58;
                const cp4x = x + size * 0.48 * widthFactor;
                const cp4y = y + size * 0.09;

                ctx.moveTo(x, y + size * 0.16);
                ctx.bezierCurveTo(cp1x, cp1y, cp2x, cp2y, topX, topY);
                ctx.bezierCurveTo(cp3x, cp3y, cp4x, cp4y, x, y + size * 0.16);
                ctx.fill();

                if (bloomPhase > 0.35) {
                    const highlightGrad = ctx.createRadialGradient(
                        x - size * 0.18, y - petalLength * 0.5, 0,
                        x - size * 0.18, y - petalLength * 0.5, size * 0.45
                    );
                    highlightGrad.addColorStop(0, 'rgba(255, 255, 255, 0.45)');
                    highlightGrad.addColorStop(1, 'transparent');
                    
                    ctx.fillStyle = highlightGrad;
                    ctx.beginPath();
                    ctx.moveTo(x, y + size * 0.1);
                    ctx.bezierCurveTo(
                        cp1x * 0.75, cp1y,
                        x - size * 0.16, y - petalLength * 0.5,
                        topX * 0.94, topY
                    );
                    ctx.bezierCurveTo(
                        x, y - petalLength * 0.58,
                        x, y + size * 0.04,
                        x, y + size * 0.1
                    );
                    ctx.fill();
                }
            }
        }

        // ========== 飘落花瓣类 ==========
        class FallingPetal {
            constructor(canvas, roseX, roseY) {
                this.canvas = canvas;
                this.roseX = roseX;
                this.roseY = roseY;
                this.reset();
            }

            reset() {
                const angle = Math.random() * Math.PI * 2;
                const dist = Math.random() * 30 + 10;
                this.x = this.roseX + Math.cos(angle) * dist;
                this.y = this.roseY + Math.sin(angle) * dist;
                this.vx = (Math.random() - 0.5) * 0.8;
                this.vy = Math.random() * 0.5 + 0.3;
                this.size = Math.random() * 8 + 5;
                this.rotation = Math.random() * Math.PI * 2;
                this.rotSpeed = (Math.random() - 0.5) * 0.05;
                this.alpha = Math.random() * 0.5 + 0.4;
                this.life = 1;
                this.swayPhase = Math.random() * Math.PI * 2;
                this.wobble = Math.random() * 2 + 1;
            }

            update(windOffset) {
                this.swayPhase += 0.03;
                this.x += this.vx + Math.sin(this.swayPhase) * 0.5 + windOffset * 0.3;
                this.y += this.vy;
                this.rotation += this.rotSpeed;
                this.life -= 0.002;
                this.alpha = this.life * (0.4 + Math.sin(this.swayPhase * this.wobble) * 0.1);

                if (this.y > this.canvas.height + 50 || this.life <= 0) {
                    return false;
                }
                return true;
            }

            draw(ctx) {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.rotation);
                ctx.globalAlpha = this.alpha;

                const grad = ctx.createRadialGradient(0, -this.size * 0.3, 0, 0, 0, this.size);
                grad.addColorStop(0, 'hsla(350, 70%, 85%, 0.8)');
                grad.addColorStop(0.5, 'hsla(355, 65%, 75%, 0.5)');
                grad.addColorStop(1, 'hsla(355, 55%, 65%, 0.15)');
                
                ctx.fillStyle = grad;
                ctx.shadowBlur = 5;
                ctx.shadowColor = 'rgba(255, 107, 157, 0.4)';

                ctx.beginPath();
                const w = this.size * 0.8;
                const h = this.size;
                ctx.moveTo(0, h * 0.2);
                ctx.bezierCurveTo(-w, 0, -w * 0.5, -h * 0.6, 0, -h);
                ctx.bezierCurveTo(w * 0.5, -h * 0.6, w, 0, 0, h * 0.2);
                ctx.fill();

                ctx.restore();
            }
        }

        // ========== 点击涟漪类 ==========
        class ClickRipple {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.radius = 5;
                this.maxRadius = 150;
                this.alpha = 1;
                this.expandSpeed = 4;
            }

            update() {
                this.radius += this.expandSpeed;
                this.alpha = 1 - (this.radius / this.maxRadius);
                return this.alpha > 0;
            }

            draw(ctx) {
                ctx.save();
                ctx.globalAlpha = this.alpha * 0.6;
                
                for (let i = 0; i < 3; i++) {
                    const r = this.radius + i * 25;
                    const a = this.alpha * (1 - i * 0.25);
                    ctx.globalAlpha = a * 0.5;
                    ctx.strokeStyle = 'rgba(255, 107, 157, 0.8)';
                    ctx.lineWidth = 2;
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, r, 0, Math.PI * 2);
                    ctx.stroke();
                }
                
                ctx.restore();
            }
        }

        // ========== 爱心烟花粒子 ==========
        class FireworkHeart {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.angle = Math.random() * Math.PI * 2;
                this.speed = Math.random() * 4 + 2;
                this.vx = Math.cos(this.angle) * this.speed;
                this.vy = Math.sin(this.angle) * this.speed;
                this.size = Math.random() * 5 + 3;
                this.alpha = 1;
                this.gravity = 0.05;
                this.life = 1;
                this.colors = [CONFIG.colors.primary, CONFIG.colors.secondary, CONFIG.colors.accent, CONFIG.colors.purple];
                this.color = this.colors[Math.floor(Math.random() * this.colors.length)];
            }

            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.vy += this.gravity;
                this.life -= 0.015;
                this.alpha = this.life;
                return this.life > 0;
            }

            draw(ctx) {
                ctx.save();
                ctx.globalAlpha = this.alpha;
                ctx.fillStyle = this.color;
                ctx.shadowBlur = 8;
                ctx.shadowColor = this.color;
                
                const w = this.size * 2;
                const h = this.size * 2;
                ctx.beginPath();
                ctx.moveTo(this.x, this.y + h / 4);
                ctx.bezierCurveTo(this.x, this.y, this.x - w / 2, this.y, this.x - w / 2, this.y + h / 4);
                ctx.bezierCurveTo(this.x - w / 2, this.y + h / 2, this.x, this.y + h * 0.7, this.x, this.y + h);
                ctx.bezierCurveTo(this.x, this.y + h * 0.7, this.x + w / 2, this.y + h / 2, this.x + w / 2, this.y + h / 4);
                ctx.bezierCurveTo(this.x + w / 2, this.y, this.x, this.y, this.x, this.y + h / 4);
                ctx.fill();
                
                ctx.restore();
            }
        }

        // ========== 爱心飘落 ==========
        class HeartRain {
            constructor(canvas, x) {
                this.canvas = canvas;
                this.x = x;
                this.y = canvas.height + 50;
                this.size = Math.random() * 10 + 15;
                this.speedY = -(Math.random() * 4 + 6);
                this.speedX = Math.random() * 0.5 - 0.25;
                this.wobble = Math.random() * Math.PI * 2;
                this.wobbleSpeed = Math.random() * 0.15 + 0.08;
                this.baseAlpha = Math.random() * 0.3 + 0.6;
                this.alpha = this.baseAlpha;
                this.rotation = Math.random() * Math.PI * 2;
                this.rotationSpeed = Math.random() * 0.05 - 0.025;
                this.colors = ['#ff4b7a', '#ff6b9d', '#ff8fab', '#ffc0cb', '#ff69b4', '#ff1493'];
                this.color = this.colors[Math.floor(Math.random() * this.colors.length)];
                this.fadeStartY = canvas.height * 0.6;
                this.shimmer = Math.random() * Math.PI * 2;
            }

            update() {
                this.y += this.speedY;
                this.x += this.speedX + Math.sin(this.wobble) * 0.8;
                this.wobble += this.wobbleSpeed;
                this.rotation += this.rotationSpeed;
                this.shimmer += 0.1;
                
                if (this.y < this.fadeStartY) {
                    const fadeRatio = Math.pow(1 - (this.y / this.fadeStartY), 2);
                    this.alpha = this.baseAlpha * (1 - Math.min(fadeRatio, 1));
                } else {
                    this.alpha = this.baseAlpha;
                }
                
                return this.y > -60 && this.alpha > 0.01;
            }

            draw(ctx) {
                if (this.alpha <= 0) return;
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.rotation);
                ctx.globalAlpha = this.alpha * (0.8 + Math.sin(this.shimmer) * 0.2);
                
                const glowIntensity = 0.6 + Math.sin(this.shimmer * 2) * 0.4;
                ctx.shadowBlur = 12 * glowIntensity;
                ctx.shadowColor = this.color;
                ctx.fillStyle = this.color;
                
                const s = this.size;
                ctx.beginPath();
                ctx.moveTo(0, s * 0.3);
                ctx.bezierCurveTo(0, 0, -s * 0.5, 0, -s * 0.5, s * 0.3);
                ctx.bezierCurveTo(-s * 0.5, s * 0.6, 0, s * 0.8, 0, s);
                ctx.bezierCurveTo(0, s * 0.8, s * 0.5, s * 0.6, s * 0.5, s * 0.3);
                ctx.bezierCurveTo(s * 0.5, 0, 0, 0, 0, s * 0.3);
                ctx.fill();
                
                ctx.restore();
            }
        }

        // ========== 星星粒子 ==========
        class Star {
            constructor(canvas) {
                this.canvas = canvas;
                this.reset();
            }

            reset() {
                this.x = Math.random() * this.canvas.width;
                this.y = Math.random() * this.canvas.height;
                this.size = Math.random() * 2 + 0.5;
                this.alpha = Math.random() * 0.5 + 0.2;
                this.twinklePhase = Math.random() * Math.PI * 2;
                this.twinkleSpeed = Math.random() * 0.05 + 0.02;
            }

            update() {
                this.twinklePhase += this.twinkleSpeed;
                this.alpha = 0.15 + Math.sin(this.twinklePhase) * 0.25;
            }

            draw(ctx) {
                ctx.save();
                ctx.globalAlpha = this.alpha;
                ctx.fillStyle = 'rgba(255, 240, 245, 0.9)';
                ctx.shadowBlur = 5;
                ctx.shadowColor = 'rgba(255, 255, 255, 0.5)';
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            }
        }

        // ========== 烟雾粒子 ==========
        class FogParticle {
            constructor(canvas) {
                this.canvas = canvas;
                this.reset();
            }

            reset() {
                this.x = Math.random() * this.canvas.width;
                this.y = Math.random() * this.canvas.height;
                this.size = Math.random() * 200 + 100;
                this.alpha = Math.random() * 0.08 + 0.02;
                this.vx = (Math.random() - 0.5) * 0.3;
                this.vy = (Math.random() - 0.5) * 0.2;
                this.phase = Math.random() * Math.PI * 2;
            }

            update() {
                this.phase += 0.01;
                this.x += this.vx + Math.sin(this.phase) * 0.2;
                this.y += this.vy;
                
                if (this.x < -this.size) this.x = this.canvas.width + this.size;
                if (this.x > this.canvas.width + this.size) this.x = -this.size;
                if (this.y < -this.size) this.y = this.canvas.height + this.size;
                if (this.y > this.canvas.height + this.size) this.y = -this.size;
            }

            draw(ctx) {
                const grad = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, this.size);
                grad.addColorStop(0, `rgba(60, 30, 50, ${this.alpha * 0.4})`);
                grad.addColorStop(0.5, `rgba(40, 20, 35, ${this.alpha * 0.2})`);
                grad.addColorStop(1, 'transparent');
                
                ctx.fillStyle = grad;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        // ========== 缓动函数 ==========
        function easeOutCubic(t) {
            return 1 - Math.pow(1 - t, 3);
        }

        function easeOutBack(t) {
            const c1 = 1.70158;
            const c3 = c1 + 1;
            return 1 + c3 * Math.pow(t - 1, 3) + c1 * Math.pow(t - 1, 2);
        }

        function easeInOutSine(t) {
            return -(Math.cos(Math.PI * t) - 1) / 2;
        }

        // ========== 音频管理器类 ==========
        class AudioManager {
            constructor() {
                this.audio = null;
                this.isMuted = false;
                this.backgroundPlaying = false;
                this.audioInitialized = false;
                this.currentTrack = null;
            }

            init() {
                if (!this.audio) {
                    this.audio = new Audio();
                    this.audio.loop = true;
                    this.audio.volume = 0.5;
                    this.audio.preload = 'auto';
                    this.audio.setAttribute('playsinline', '');
                    this.audio.setAttribute('webkit-playsinline', '');
                }
                if (!this.audioInitialized) {
                    this.audioInitialized = true;
                }
                return this;
            }

            setTrack(trackName) {
                if (this.currentTrack === trackName) return;
                
                const tracks = {
                    'quiz': { src: '晚风的告白.mp3', volume: 0.3 },
                    'main': { src: '所念皆星河（新版）-CMJ.mp3', volume: 0.6 }
                };
                
                if (tracks[trackName]) {
                    this.currentTrack = trackName;
                    this.audio.src = tracks[trackName].src;
                    if (!this.isMuted) {
                        this.audio.volume = tracks[trackName].volume;
                    }
                }
            }

            toggleMute() {
                this.isMuted = !this.isMuted;
                if (this.audio) {
                    this.audio.volume = this.isMuted ? 0 : 0.5;
                }
                return this.isMuted;
            }

            async playBackgroundMusic(track = 'main') {
                if (this.isMuted || !this.audio) return;

                this.setTrack(track);

                try {
                    this.audio.currentTime = 0;
                    await this.audio.play();
                    this.backgroundPlaying = true;
                } catch (err) {
                    console.log('音频播放需要用户交互:', err);
                    document.addEventListener('touchstart', () => {
                        if (!this.backgroundPlaying && !this.isMuted) {
                            this.audio.play().then(() => {
                                this.backgroundPlaying = true;
                            }).catch(() => {});
                        }
                    }, { once: true });
                }
            }

            stopBackgroundMusic() {
                if (this.audio && !this.audio.paused) {
                    this.audio.pause();
                    this.audio.currentTime = 0;
                    this.backgroundPlaying = false;
                }
            }

            playHeartbeatSound() {
            }

            playClickSound() {
            }
        }

        // ========== 主动画类 ==========
        class LoveAnimation {
            constructor() {
                this.canvas = document.getElementById('particleCanvas');
                this.ctx = this.canvas.getContext('2d');
                this.container = document.getElementById('container');
                this.textContainer = document.getElementById('textContainer');
                this.loveText = document.getElementById('loveText');
                this.hint = document.getElementById('hint');
                this.loopBtn = document.getElementById('loopBtn');
                this.soundBtn = document.getElementById('soundBtn');
                
                this.audioManager = new AudioManager();
                
                this.particlePool = null;
                this.particles = [];
                this.roses = [];
                this.fallingPetals = [];
                this.ripples = [];
                this.fireworks = [];
                this.heartRains = [];
                this.stars = [];
                this.fog = [];
                
                this.animationId = null;
                this.phase = 'idle';
                this.startTime = 0;
                this.elapsed = 0;
                this.lastTime = 0;
                this.windOffset = 0;
                this.backgroundPhase = 0;
                this.shakeAmount = 0;
                this.isLooping = false;
                this.autoClickTimer = null;
                
                this.typingText = '❤️ 大笨蛋，遇见你，是我最美的意外 ❤️';
                this.typingIndex = 0;
                this.typingInterval = null;
                this.typingStarted = false;
                this.quotesStarted = false;
                this.heartsStarted = false;
                
                this.roseReplaceTimer = null;
                this.roseReplaceIndex = 0;
                this.usingAltPhotos = false;
                
                this.init();
            }

            init() {
                this.resize();
                window.addEventListener('resize', () => this.resize());
                
                this.container.addEventListener('click', (e) => this.handleClick(e));
                this.loopBtn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    this.toggleLoop();
                });
                this.soundBtn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    this.toggleSound();
                });
                
                this.particlePool = new ParticlePool(this.canvas, CONFIG.particle.poolSize);
                
                this.createParticles();
                this.createRoses();
                this.createStars();
                this.createFog();
                
                this.render();
                
                setTimeout(() => {
                    if (this.phase === 'idle') {
                        this.startAnimation();
                    }
                }, 3000);
            }

            resize() {
                this.canvas.width = window.innerWidth;
                this.canvas.height = window.innerHeight;
                
                if (this.particles.length > 0) {
                    this.particles.forEach(p => {
                        p.canvas = this.canvas;
                        p.targetX = this.canvas.width / 2;
                        p.targetY = this.canvas.height / 2;
                    });
                }
                
                if (this.roses.length === 0) {
                    this.createRoses();
                }
            }

            createParticles() {
                this.particles = [];
                for (let i = 0; i < CONFIG.particle.count; i++) {
                    const p = this.particlePool.get();
                    this.particles.push(p);
                }
            }

            createRoses() {
                this.roses = [];
                const positions = [
                    { x: this.canvas.width * 0.15, y: this.canvas.height * 0.2 },
                    { x: this.canvas.width * 0.85, y: this.canvas.height * 0.25 },
                    { x: this.canvas.width * 0.2, y: this.canvas.height * 0.75 },
                    { x: this.canvas.width * 0.8, y: this.canvas.height * 0.8 },
                    { x: this.canvas.width * 0.5, y: this.canvas.height * 0.15 }
                ];
                
                const sizes = [120, 90, 100, 80, 70];
                
                positions.forEach((pos, i) => {
                    const rose = new RoseFlower(this.canvas, pos.x, pos.y, sizes[i]);
                    this.roses.push(rose);
                });
            }
            
            createNewRosePosition() {
                const padding = 100;
                const x = padding + Math.random() * (this.canvas.width - padding * 2);
                const y = padding + Math.random() * (this.canvas.height - padding * 2);
                const radius = 70 + Math.random() * 60;
                return { x, y, radius };
            }
            
            startRoseReplace() {
                if (this.roseReplaceTimer) return;
                
                this.roseReplaceIndex = 0;
                
                const replaceNext = () => {
                    const activeRoses = this.roses.filter(r => !r.fadeOut || r.fadeOutPhase < 1);
                    
                    if (activeRoses.length >= 5) {
                        this.roseReplaceTimer = setTimeout(replaceNext, 2000);
                        return;
                    }
                    
                    if (this.roseReplaceIndex >= 5) {
                        this.roseReplaceIndex = 0;
                    }
                    
                    const oldRose = this.roses[this.roseReplaceIndex];
                    if (oldRose && !oldRose.fadeOut) {
                        oldRose.startFadeOut();
                    }
                    
                    const newPos = this.createNewRosePosition();
                    const newRose = new RoseFlower(this.canvas, newPos.x, newPos.y, newPos.radius);
                    this.roses.push(newRose);
                    
                    this.roseReplaceIndex++;
                    
                    this.roseReplaceTimer = setTimeout(replaceNext, CONFIG.rose.replaceInterval);
                };
                
                replaceNext();
            }
            
            updateRoses(elapsed) {
                const replaceStartDelay = CONFIG.rose.replaceStartDelay;
                const bloomDelay = CONFIG.animation.bloomDelay;
                
                if (elapsed > bloomDelay + replaceStartDelay && !this.roseReplaceTimer && this.roseReplaceIndex < this.roses.length) {
                    this.startRoseReplace();
                }
                
                this.roses = this.roses.filter(rose => !rose.isFullyFaded());
                
                this.roses.forEach(rose => {
                    rose.update(elapsed, this.windOffset);
                });
            }
            
            createStars() {
                this.stars = [];
                const count = isMobile ? 40 : 70;
                for (let i = 0; i < count; i++) {
                    this.stars.push(new Star(this.canvas));
                }
            }

            createFog() {
                this.fog = [];
                const count = isMobile ? 8 : 12;
                for (let i = 0; i < count; i++) {
                    this.fog.push(new FogParticle(this.canvas));
                }
            }

            handleClick(e, isAuto = false) {
                const rect = this.canvas.getBoundingClientRect();
                const x = isAuto ? Math.random() * this.canvas.width : (e.clientX - rect.left);
                const y = isAuto ? Math.random() * this.canvas.height : (e.clientY - rect.top);
                
                const fireworkCount = isMobile ? 12 : 25;
                for (let i = 0; i < fireworkCount; i++) {
                    this.fireworks.push(new FireworkHeart(x, y));
                }
                
                this.ripples.push(new ClickRipple(x, y));
                
                this.shakeAmount = isMobile ? 1.2 : 3;
                
                this.audioManager.init();
                
                if (!this.audioManager.isMuted && !this.audioManager.backgroundPlaying && !isAuto) {
                    // 只在没有播放音乐时才播放，避免覆盖答题音乐
                    this.audioManager.playBackgroundMusic();
                }
                
                // 切换相册照片（非自动点击时）
                if (!isAuto && this.phase !== 'idle') {
                    this.toggleCarouselPhotos();
                }
                
                if (this.phase === 'idle') {
                    this.startAnimation();
                }
            }

            toggleCarouselPhotos() {
                this.usingAltPhotos = !this.usingAltPhotos;
                const carousel = document.getElementById('carouselContainer');
                if (!carousel) return;
                
                const imgs = carousel.querySelectorAll('img');
                imgs.forEach(img => {
                    const originalSrc = 'https://img.cdn1.vip/i/6a0b39e4019a5_1779120612.webp';
                    const originalSrc2 = 'https://img.cdn1.vip/i/6a0b39e16676a_1779120609.webp';
                    const originalSrc3 = 'https://img.cdn1.vip/i/6a0b39e590bc9_1779120613.webp';
                    const originalSrc4 = 'https://img.cdn1.vip/i/6a0b39e884111_1779120616.webp';
                    const originalSrc5 = 'https://img.cdn1.vip/i/6a0b39ea65da4_1779120618.webp';
                    const altSrc = 'https://img.cdn1.vip/i/6a0b3ee27d2d3_1779121890.webp';
                    const altSrc2 = 'https://img.cdn1.vip/i/6a0b3ee0c4dd7_1779121888.webp';
                    const altSrc3 = 'https://img.cdn1.vip/i/6a0b3ee733ace_1779121895.webp';
                    const altSrc4 = 'https://img.cdn1.vip/i/6a0b3eea75c02_1779121898.webp';
                    const altSrc5 = 'https://img.cdn1.vip/i/6a0b3ee5b0b46_1779121893.webp';
                    
                    const currentSrc = img.getAttribute('src');
                    const index = Array.from(imgs).indexOf(img);
                    
                    const originalSources = [originalSrc, originalSrc2, originalSrc3, originalSrc4, originalSrc5];
                    const altSources = [altSrc, altSrc2, altSrc3, altSrc4, altSrc5];
                    
                    if (this.usingAltPhotos) {
                        img.setAttribute('src', altSources[index]);
                    } else {
                        img.setAttribute('src', originalSources[index]);
                    }
                    
                    img.style.opacity = '0';
                    setTimeout(() => {
                        img.style.opacity = '1';
                    }, 100);
                });
            }

            toggleLoop() {
                this.isLooping = !this.isLooping;
                this.loopBtn.textContent = this.isLooping ? '循环中' : '循环播放';
                this.loopBtn.classList.toggle('active', this.isLooping);
            }
            
            toggleSound() {
                const isMuted = this.audioManager.init().toggleMute();
                this.soundBtn.textContent = isMuted ? '🔊 音效' : '🔇 静音';
                this.soundBtn.classList.toggle('active', !isMuted);
                
                if (!isMuted) {
                    this.audioManager.playBackgroundMusic();
                }
            }

            startAnimation() {
                this.audioManager.init();
                // 只在没有播放音乐时才播放，避免覆盖答题音乐
                if (!this.audioManager.isMuted && !this.audioManager.backgroundPlaying) {
                    this.audioManager.playBackgroundMusic();
                }
                if (this.phase !== 'idle') return;
                
                this.phase = 'gather';
                this.startTime = Date.now();
                this.elapsed = 0;
                this.typingStarted = false;
                this.quotesStarted = false;
                this.heartsStarted = false;
                
                this.textContainer.classList.remove('visible');
                this.loveText.classList.remove('show');
                this.hint.classList.remove('up');
                
                // 隐藏3D旋转相册
                const carouselContainer = document.getElementById('carouselContainer');
                if (carouselContainer) {
                    carouselContainer.classList.remove('show');
                }
                
                this.typingIndex = 0;
                this.loveText.textContent = '';
                
                this.fallingPetals = [];
                this.ripples = [];
                this.fireworks = [];
                
                this.createParticles();
                this.createRoses();
                
                // 打字机结束后显示3D旋转相册
                setTimeout(() => {
                    if (carouselContainer) {
                        carouselContainer.classList.add('show');
                    }
                }, 7000);
                
                this.animate();
            }
            
            startHeartRain() {
                if (this.autoClickTimer) clearInterval(this.autoClickTimer);
                
                this.autoClickTimer = setInterval(() => {
                    if (this.phase === 'bloom' || this.phase === 'disperse') {
                        for (let i = 0; i < 2; i++) {
                            const x = Math.random() * this.canvas.width;
                            this.heartRains.push(new HeartRain(this.canvas, x));
                        }
                    }
                }, CONFIG.animation.autoClickInterval);
            }
            
            stopAutoClick() {
                if (this.autoClickTimer) {
                    clearInterval(this.autoClickTimer);
                    this.autoClickTimer = null;
                }
            }

            animate() {
                const now = Date.now();
                const elapsed = now - this.startTime;
                this.elapsed = elapsed;
                
                this.windOffset = Math.sin(now * 0.0008) * 0.5;
                
                if (this.shakeAmount > 0) {
                    this.shakeAmount *= 0.92;
                    if (this.shakeAmount < 0.5) this.shakeAmount = 0;
                }
                
                if (elapsed > CONFIG.animation.fadeDelay) {
                    if (this.phase !== 'disperse') {
                        this.roses.forEach(rose => {
                            for (let i = 0; i < CONFIG.rose.petalsPerRose; i++) {
                                this.fallingPetals.push(new FallingPetal(this.canvas, rose.x, rose.y));
                            }
                        });
                    }
                    this.phase = 'disperse';
                } else if (elapsed > CONFIG.animation.bloomDelay) {
                    if (this.phase !== 'bloom') {
                        this.hint.classList.add('up');
                        
                        if (elapsed > CONFIG.animation.bloomDelay + 500 && this.phase !== 'bloom') {
                            this.roses.forEach(rose => {
                                for (let i = 0; i < 3; i++) {
                                    this.fallingPetals.push(new FallingPetal(this.canvas, rose.x, rose.y));
                                }
                            });
                        }
                    }
                    this.phase = 'bloom';
                    this.textContainer.classList.add('visible');
                    
                    if (!this.quotesStarted) {
                        this.quotesStarted = true;
                        setTimeout(() => {
                            if (this.phase !== 'idle') {
                                this.startLoveQuotes();
                            }
                        }, 500);  // bloom后0.5秒（打字机结束前出现）
                    }
                    
                    if (!this.heartsStarted) {
                        this.heartsStarted = true;
                        setTimeout(() => {
                            if (this.phase !== 'idle') {
                                this.startHeartRain();
                            }
                        }, 300);
                    }
                }
                
                if (elapsed > CONFIG.animation.typingStartDelay && !this.typingStarted) {
                    this.startTyping();
                    this.typingStarted = true;
                }
                
                this.render(elapsed);
                
                if (this.phase === 'disperse') {
                    const totalDuration = CONFIG.animation.duration;
                    const stopClickTime = totalDuration - 3000;
                    
                    if (elapsed > stopClickTime) {
                        this.stopAutoClick();
                    }
                    
                    if (elapsed >= totalDuration) {
                        if (this.isLooping) {
                            setTimeout(() => {
                                this.startAnimation();
                            }, 2000);
                        } else {
                            this.phase = 'idle';
                            return;
                        }
                    }
                }
                
                this.animationId = requestAnimationFrame(() => this.animate());

            startTyping() {
